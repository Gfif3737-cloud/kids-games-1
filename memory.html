<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>🧠 Линия памяти</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(145deg, #0a1c2f, #0b2b3f); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { font-size: 32px; margin: 20px 0; color: #ffd966; }
    .controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 25px; background: rgba(10,30,40,0.7); padding: 20px; border-radius: 40px; }
    .controls select, .controls button { padding: 10px 20px; border-radius: 30px; border: 2px solid #4f9fff; background: #1e3a5f; color: white; font-weight: bold; cursor: pointer; }
    .controls button { background: #ff7b4f; border-color: #ffaa33; }
    .memory-grid { display: grid; gap: 12px; justify-content: center; margin: 20px auto; max-width: 500px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 30px; }
    .memory-card { aspect-ratio: 1 / 1; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 32px; transition: 0.1s; box-shadow: 0 5px 0 rgba(0,0,0,0.5); background-color: #2c3e50; color: white; }
    #statsPanel { margin: 15px auto; font-size: 20px; font-weight: bold; display: flex; justify-content: center; gap: 30px; background: #0a1e2c; padding: 12px 25px; border-radius: 40px; color: #ffd966; }
    .back { display: inline-block; margin-top: 25px; color: #b0e0ff; text-decoration: none; font-weight: bold; font-size: 18px; padding: 10px 25px; border-radius: 40px; background: #1e3a5f; border: 2px solid #4f9fff; }
    @media (max-width: 500px) { .memory-grid { gap: 8px; } .memory-card { font-size: 24px; } #statsPanel { font-size: 16px; padding: 10px 20px; gap: 20px; } }
  </style>
</head>
<body>
  <h1>🧠 Линия памяти</h1>
  <div class="controls">
    <select id="themeSelect">
      <option value="smeshariki">Смешарики</option>
      <option value="prostokvashino">Простоквашино</option>
      <option value="fixiki">Фиксики</option>
      <option value="vinni">Винни Пух</option>
      <option value="masha">Маша и Медведь</option>
    </select>
    <select id="levelSelect"></select>
    <button id="startBtn">🚀 Старт</button>
  </div>
  <div id="memoryGrid" class="memory-grid"></div>
  <a href="index.html" class="back">⬅ Назад в меню</a>
  <script src="memory.js"></script>
</body>
</html>
