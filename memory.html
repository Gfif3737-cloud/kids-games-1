<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Линия памяти</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 700px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .level-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .level-btn {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 8px 12px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
    }
    .level-btn.active { background: #ff7b4f; border-color: #ffaa33; }
    .level-btn.locked { opacity: 0.5; cursor: not-allowed; }
    .controls { display: flex; justify-content: center; margin-bottom: 20px; }
    button {
      background: #ff7b4f;
      border: 2px solid #ffaa33;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .memory-grid {
      display: grid;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 32px;
    }
    .card {
      aspect-ratio: 1 / 1;
      background-color: #2c3e50;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 6px 0 #0f1a24;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .card.matched { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; }
    .stats {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-size: 16px;
      font-weight: bold;
      color: #ffd966;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .theme-info { 
      text-align: center; 
      margin-bottom: 10px; 
      font-size: 18px; 
      font-weight: bold; 
      color: #ffd966;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 30px;
      display: none;
    }
    .theme-info.visible { display: block; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    @media (max-width: 550px) { .card { font-size: 24px; } .stats { font-size: 12px; } .level-btn { padding: 5px 8px; font-size: 10px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🧠 Линия памяти</h1>
  
  <div class="level-selector" id="levelSelector"></div>
  
  <div class="controls">
    <button id="startBtn">🎮 Новая игра</button>
  </div>
  
  <div id="themeInfo" class="theme-info">🎬 ???</div>
  <div id="grid" class="memory-grid"></div>
  
  <div id="stats" class="stats">
    <span>🃏 Ходы: 0</span>
    <span>⏱️ Время: 0с</span>
  </div>
  
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
const LEVELS = [
  { id: 0, size: '4x2', name: 'Лёгкий', cols: 4, rows: 2, pairs: 4 },
  { id: 1, size: '4x3', name: 'Средний', cols: 4, rows: 3, pairs: 6 },
  { id: 2, size: '4x4', name: 'Сложный', cols: 4, rows: 4, pairs: 8 },
  { id: 3, size: '4x5', name: 'Эксперт', cols: 4, rows: 5, pairs: 10 },
  { id: 4, size: '4x6', name: 'Мастер', cols: 4, rows: 6, pairs: 12 }
];

const BASE_URL = 'https://gfif3737-cloud.github.io/kids-games-1/images/';

const ALL_THEMES = [
  { 
    name: 'Смешарики', 
    icon: '🐰', 
    chars: [
      { name: 'Крош', emoji: '🐰', img: BASE_URL + 'Crosh%20.WEBP', color: '#FF69B4' },
      { name: 'Ёжик', emoji: '🦔', img: BASE_URL + 'Esg.WEBP', color: '#8B4513' },
      { name: 'Нюша', emoji: '🐷', img: BASE_URL + 'Nusha.WEBP', color: '#FFB6C1' },
      { name: 'Бараш', emoji: '🐑', img: BASE_URL + 'Barah.WEBP', color: '#87CEEB' },
      { name: 'Лосяш', emoji: '🦌', img: BASE_URL + 'Losash.PNG', color: '#FFD700' }
    ]
  },
  { 
    name: 'Простоквашино', 
    icon: '🐱', 
    chars: [
      { name: 'Матроскин', emoji: '🐱', img: BASE_URL + 'matroskin.PNG', color: '#FFA500' },
      { name: 'Шарик', emoji: '🐶', img: BASE_URL + 'Sharik%20.PNG', color: '#DEB887' },
      { name: 'Дядя Фёдор', emoji: '👦', img: BASE_URL + 'DadaFedor.WEBP', color: '#98FB98' },
      { name: 'Печкин', emoji: '📮', img: BASE_URL + 'Pechkin%20.WEBP', color: '#708090' },
      { name: 'Галчонок', emoji: '🐦', img: BASE_URL + 'Galchonok.WEBP', color: '#000000' }
    ]
  },
  { 
    name: 'Фиксики', 
    icon: '🔧', 
    chars: [
      { name: 'Нолик', emoji: '0️⃣', img: BASE_URL + 'Nolik%20.WEBP', color: '#00BFFF' },
      { name: 'Симка', emoji: '1️⃣', img: BASE_URL + 'Simka.WEBP', color: '#FF69B4' },
      { name: 'Папус', emoji: '👨', img: BASE_URL + 'Papus%20.WEBP', color: '#4169E1' },
      { name: 'Мася', emoji: '👩', img: BASE_URL + 'Maca%20.WEBP', color: '#FFA500' },
      { name: 'Дедус', emoji: '👴', img: BASE_URL + 'Ded.WEBP', color: '#708090' }
    ]
  },
  { 
    name: 'Винни Пух', 
    icon: '🐻', 
    chars: [
      { name: 'Винни', emoji: '🐻', img: BASE_URL + 'Vivipux.WEBP', color: '#CD853F' },
      { name: 'Пятачок', emoji: '🐖', img: BASE_URL + 'Patashok%20.WEBP', color: '#FFB6C1' },
      { name: 'Кролик', emoji: '🐇', img: BASE_URL + 'Zaacz.WEBP', color: '#87CEEB' },
      { name: 'Иа', emoji: '🐴', img: BASE_URL + 'Ia.WEBP', color: '#708090' },
      { name: 'Сова', emoji: '🦉', img: BASE_URL + 'Sova.WEBP', color: '#9370DB' }
    ]
  },
  { 
    name: 'Маша и Медведь', 
    icon: '👧', 
    chars: [
      { name: 'Маша', emoji: '👧', img: BASE_URL + 'Masha.WEBP', color: '#FF69B4' },
      { name: 'Медведь', emoji: '🐻', img: BASE_URL + 'Medvedi.WEBP', color: '#8B4513' },
      { name: 'Панда', emoji: '🐼', img: BASE_URL + 'Panda.PNG', color: '#000000' },
      { name: 'Розочка', emoji: '🌸', img: BASE_URL + 'Ross.WEBP', color: '#FFB6C1' },
      { name: 'Зайка', emoji: '🐰', img: BASE_URL + 'Zaichik.PNG', color: '#87CEEB' }
    ]
  }
];

let levelProgress = JSON.parse(localStorage.getItem('memory_level_progress')) || {
  currentLevel: 0,
  completedLevels: [false, false, false, false, false],
  collectedCharacters: {}
};

for (let theme of ALL_THEMES) {
  if (!levelProgress.collectedCharacters[theme.name]) {
    levelProgress.collectedCharacters[theme.name] = [false, false, false, false, false];
  }
}

function saveProgress() {
  localStorage.setItem('memory_level_progress', JSON.stringify(levelProgress));
}

function renderLevelSelector() {
  const container = document.getElementById('levelSelector');
  container.innerHTML = '';
  LEVELS.forEach((level, idx) => {
    const btn = document.createElement('button');
    btn.textContent = `${level.name} (${level.size})`;
    btn.className = 'level-btn';
    if (idx === levelProgress.currentLevel) btn.classList.add('active');
    if (idx > levelProgress.currentLevel && !levelProgress.completedLevels[idx-1]) {
      btn.classList.add('locked');
      btn.disabled = true;
    }
    btn.onclick = () => {
      if (!btn.disabled) {
        levelProgress.currentLevel = idx;
        saveProgress();
        renderLevelSelector();
        initGame();
      }
    };
    container.appendChild(btn);
  });
}

function getRandomCharacters() {
  const level = LEVELS[levelProgress.currentLevel];
  const neededCharacters = level.pairs;
  const randomTheme = ALL_THEMES[Math.floor(Math.random() * ALL_THEMES.length)];
  
  let selected = [];
  for (let i = 0; i < neededCharacters; i++) {
    const charIndex = i % randomTheme.chars.length;
    selected.push({
      themeName: randomTheme.name,
      themeIcon: randomTheme.icon,
      charIndex: charIndex,
      char: randomTheme.chars[charIndex]
    });
  }
  
  for (let i = selected.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [selected[i], selected[j]] = [selected[j], selected[i]];
  }
  
  let pool = [];
  for (let s of selected) {
    pool.push({ ...s });
    pool.push({ ...s });
  }
  
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  
  return { pool, selected, theme: randomTheme };
}

function giveRandomReward() {
  const randomTheme = ALL_THEMES[Math.floor(Math.random() * ALL_THEMES.length)];
  const randomCharIndex = Math.floor(Math.random() * randomTheme.chars.length);
  const themeName = randomTheme.name;
  const charIndex = randomCharIndex;
  const charName = randomTheme.chars[charIndex].name;
  const collected = levelProgress.collectedCharacters[themeName];
  
  if (!collected[charIndex]) {
    collected[charIndex] = true;
    saveProgress();
    setTimeout(() => {
      alert(`🎁 НОВАЯ ФИГУРКА!\n\n${themeName} - ${charName}\n\nЗагляни в Музей метро!`);
    }, 300);
  } else {
    let coins = JSON.parse(localStorage.getItem('memory_coins')) || 0;
    coins++;
    localStorage.setItem('memory_coins', JSON.stringify(coins));
    setTimeout(() => {
      alert(`🪙 МОНЕТКА!\n\nУ тебя уже есть эта фигурка.\n+1 монетка (всего: ${coins})`);
    }, 300);
  }
}

function checkLevelComplete() {
  if (!levelProgress.completedLevels[levelProgress.currentLevel]) {
    levelProgress.completedLevels[levelProgress.currentLevel] = true;
    if (levelProgress.currentLevel + 1 < LEVELS.length) {
      levelProgress.currentLevel++;
    }
    saveProgress();
    renderLevelSelector();
    setTimeout(() => {
      alert(`🎉 УРОВЕНЬ ПРОЙДЕН!\n\nОткрыт следующий уровень сложности!`);
    }, 500);
  }
}

const gridDiv = document.getElementById('grid');
const startBtn = document.getElementById('startBtn');
const statsDiv = document.getElementById('stats');
const themeInfoDiv = document.getElementById('themeInfo');

let cards = [];
let lockBoard = false;
let firstIndex = null;
let secondIndex = null;
let moves = 0;
let seconds = 0;
let timerInterval = null;
let totalPairs = 0;
let matchedCount = 0;
let currentTheme = null;
let themeRevealed = false;

function updateStatsUI() {
  statsDiv.innerHTML = `<span>🃏 Ходы: ${moves}</span><span>⏱️ Время: ${seconds}с</span>`;
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
}

function startTimer() {
  if (timerInterval) stopTimer();
  seconds = 0;
  updateStatsUI();
  timerInterval = setInterval(() => { seconds++; updateStatsUI(); }, 1000);
}

function revealTheme() {
  if (!themeRevealed && currentTheme) {
    themeRevealed = true;
    themeInfoDiv.classList.add('visible');
    themeInfoDiv.innerHTML = `🎬 Тема: ${currentTheme.name} ${currentTheme.icon}`;
  }
}

function winGame() {
  stopTimer();
  giveRandomReward();
  checkLevelComplete();
  setTimeout(() => {
    alert(`🎉 Победа! Ходов: ${moves}, время: ${seconds} сек`);
  }, 100);
}

function onCardClick(idx) {
  if (lockBoard) return;
  const card = cards[idx];
  if (card.matched) return;
  if (card.flipped) return;
  
  if (!themeRevealed) revealTheme();
  
  card.flipped = true;
  if (card.char.img) {
    card.element.style.backgroundImage = `url('${card.char.img}')`;
    card.element.style.backgroundSize = 'cover';
    card.element.style.backgroundPosition = 'center';
    card.element.textContent = '';
  } else {
    card.element.textContent = card.char.emoji;
  }
  card.element.style.backgroundColor = card.char.color;
  
  if (firstIndex === null) {
    firstIndex = idx;
    return;
  }
  
  if (secondIndex === null && firstIndex !== idx) {
    secondIndex = idx;
    moves++;
    updateStatsUI();
    
    const card1 = cards[firstIndex];
    const card2 = cards[secondIndex];
    
    if (card1.char.name === card2.char.name && card1.themeName === card2.themeName) {
      card1.matched = true;
      card2.matched = true;
      card1.flipped = false;
      card2.flipped = false;
      card1.element.classList.add('matched');
      card2.element.classList.add('matched');
      matchedCount++;
      
      firstIndex = null;
      secondIndex = null;
      
      if (matchedCount === totalPairs) winGame();
    } else {
      lockBoard = true;
      setTimeout(() => {
        card1.flipped = false;
        card2.flipped = false;
        card1.element.style.backgroundImage = '';
        card2.element.style.backgroundImage = '';
        card1.element.textContent = '❓';
        card2.element.textContent = '❓';
        card1.element.style.backgroundColor = '#2c3e50';
        card2.element.style.backgroundColor = '#2c3e50';
        firstIndex = null;
        secondIndex = null;
        lockBoard = false;
      }, 700);
    }
  }
}

function initGame() {
  const level = LEVELS[levelProgress.currentLevel];
  const { pool, selected, theme } = getRandomCharacters();
  currentTheme = theme;
  themeRevealed = false;
  themeInfoDiv.classList.remove('visible');
  themeInfoDiv.innerHTML = '🎬 ???';
  totalPairs = level.pairs;
  
  const cols = level.cols;
  gridDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  gridDiv.style.gap = '8px';
  
  cards = [];
  matchedCount = 0;
  firstIndex = null;
  secondIndex = null;
  lockBoard = false;
  moves = 0;
  updateStatsUI();
  stopTimer();
  startTimer();
  
  gridDiv.innerHTML = '';
  
  for (let i = 0; i < pool.length; i++) {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'card';
    cardDiv.textContent = '❓';
    cardDiv.style.backgroundColor = '#2c3e50';
    cardDiv.style.backgroundSize = 'cover';
    cardDiv.style.backgroundPosition = 'center';
    cardDiv.onclick = (function(idx) { return function() { onCardClick(idx); }; })(i);
    gridDiv.appendChild(cardDiv);
    
    cards.push({
      themeName: pool[i].themeName,
      char: pool[i].char,
      matched: false,
      flipped: false,
      element: cardDiv
    });
  }
}

startBtn.addEventListener('click', () => initGame());
renderLevelSelector();
initGame();
</script>
</body>
</html>
