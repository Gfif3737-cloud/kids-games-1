<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Линия памяти</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    select, button {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button { background: #ff7b4f; border-color: #ffaa33; }
    .memory-grid {
      display: grid;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 32px;
    }
    .card {
      aspect-ratio: 1 / 1;
      background-color: #2c3e50;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 6px 0 #0f1a24;
    }
    .card.matched { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; }
    .stats { background: #0a1e2c; border-radius: 40px; padding: 12px; display: flex; justify-content: center; gap: 30px; font-size: 18px; font-weight: bold; color: #ffd966; margin: 15px 0; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    @media (max-width: 480px) { .card { font-size: 24px; } .stats { font-size: 14px; gap: 15px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🧠 Линия памяти</h1>
  <div class="controls">
    <select id="themeSelect">
      <option value="smeshariki">Смешарики</option>
      <option value="prostokvashino">Простоквашино</option>
      <option value="fixiki">Фиксики</option>
      <option value="vinni">Винни Пух</option>
      <option value="masha">Маша и Медведь</option>
    </select>
    <select id="levelSelect"></select>
    <button id="startBtn">Старт</button>
  </div>
  <div id="grid" class="memory-grid"></div>
  <div id="stats" class="stats">Ходы: 0 | Время: 0с</div>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
// ==================== УРОВНИ ====================
const LEVELS = [
  { id: 'level1', size: '4x2', name: 'Лёгкий (4×2)', pairs: 4, rewardIndex: 0 },
  { id: 'level2', size: '4x3', name: 'Средний (4×3)', pairs: 6, rewardIndex: 1 },
  { id: 'level3', size: '4x4', name: 'Сложный (4×4)', pairs: 8, rewardIndex: 2 },
  { id: 'level4', size: '4x5', name: 'Эксперт (4×5)', pairs: 10, rewardIndex: 3 },
  { id: 'level5', size: '4x6', name: 'Мастер (4×6)', pairs: 12, rewardIndex: 4 }
];

// ==================== МУЛЬТФИЛЬМЫ ====================
const THEMES = {
  smeshariki: { name: 'Смешарики', icon: '🐰', chars: ['🐰', '🦔', '🐷', '🐑', '🦌', '🐻', '🦉', '🐧'], rewards: ['Крош', 'Ёжик', 'Нюша', 'Бараш', 'Лосяш'] },
  prostokvashino: { name: 'Простоквашино', icon: '🐱', chars: ['🐱', '🐶', '👦', '📮', '🐦', '🐄', '👩', '🦫'], rewards: ['Матроскин', 'Шарик', 'Дядя Фёдор', 'Печкин', 'Галчонок'] },
  fixiki: { name: 'Фиксики', icon: '🔧', chars: ['0️⃣', '1️⃣', '👨', '👩', '👴', '🔧', '🧵', '🔩'], rewards: ['Нолик', 'Симка', 'Папус', 'Мася', 'Дедус'] },
  vinni: { name: 'Винни Пух', icon: '🐻', chars: ['🐻', '🐖', '🐇', '🐴', '🦉', '🐯', '🦘', '👶'], rewards: ['Винни', 'Пятачок', 'Кролик', 'Иа', 'Сова'] },
  masha: { name: 'Маша и Медведь', icon: '👧', chars: ['👧', '🐻', '🐼', '🌸', '🐰', '🐺', '🐿️', '🦔'], rewards: ['Маша', 'Медведь', 'Панда', 'Розочка', 'Зайка'] }
};

// ==================== ПРОГРЕСС ====================
let levelProgress = JSON.parse(localStorage.getItem('memory_progress')) || {};
let artifacts = JSON.parse(localStorage.getItem('metro_artifacts')) || {};

function saveProgress() {
  localStorage.setItem('memory_progress', JSON.stringify(levelProgress));
}

function updateLevelSelect() {
  const theme = themeSelect.value;
  const select = document.getElementById('levelSelect');
  select.innerHTML = '';
  const themeProgress = levelProgress[theme] || {};
  
  LEVELS.forEach((level, idx) => {
    const option = document.createElement('option');
    option.value = idx;
    const isUnlocked = themeProgress[level.id] !== false;
    const isCompleted = themeProgress[level.id + '_completed'] === true;
    if (isUnlocked) {
      option.disabled = false;
      option.textContent = level.name + (isCompleted ? ' ✓' : '');
    } else {
      option.disabled = true;
      option.textContent = '🔒 ' + level.name;
    }
    select.appendChild(option);
  });
  
  // Выбираем первый доступный уровень
  const themeProgressCurrent = levelProgress[theme] || {};
  for (let i = 0; i < LEVELS.length; i++) {
    if (themeProgressCurrent[LEVELS[i].id] !== false) {
      select.value = i;
      return;
    }
  }
  select.value = 0;
}

function giveReward(themeName, levelIndex) {
  const themeData = THEMES[themeName];
  if (!themeData) return;
  const rewardName = themeData.rewards[levelIndex];
  if (!rewardName) return;
  
  if (!artifacts.memoryRewards) artifacts.memoryRewards = {};
  if (!artifacts.memoryRewards[themeName]) artifacts.memoryRewards[themeName] = [];
  
  if (!artifacts.memoryRewards[themeName][levelIndex]) {
    artifacts.memoryRewards[themeName][levelIndex] = true;
    localStorage.setItem('metro_artifacts', JSON.stringify(artifacts));
    setTimeout(() => {
      alert(`🎁 ПОЛУЧЕНА НАГРАДА!\n\n${rewardName} (${themeData.name})\n\nЗагляни в Музей метро!`);
    }, 300);
  }
}

function completeLevel(theme, levelIndex) {
  const levelId = LEVELS[levelIndex].id;
  if (!levelProgress[theme]) levelProgress[theme] = {};
  
  if (!levelProgress[theme][levelId + '_completed']) {
    levelProgress[theme][levelId + '_completed'] = true;
    
    // Открываем следующий уровень
    if (levelIndex + 1 < LEVELS.length) {
      levelProgress[theme][LEVELS[levelIndex + 1].id] = true;
    }
    
    saveProgress();
    updateLevelSelect();
    giveReward(theme, levelIndex);
    
    const nextName = levelIndex + 1 < LEVELS.length ? LEVELS[levelIndex + 1].name : 'все уровни пройдены!';
    setTimeout(() => {
      alert(`🎉 Уровень пройден!\n\nСледующий уровень: ${nextName}`);
    }, 300);
  }
}

// ==================== ИГРОВАЯ МЕХАНИКА ====================
const gridDiv = document.getElementById('grid');
const themeSelect = document.getElementById('themeSelect');
const startBtn = document.getElementById('startBtn');
const statsDiv = document.getElementById('stats');

let cards = [];
let lockBoard = false;
let firstIndex = null;
let secondIndex = null;
let moves = 0;
let seconds = 0;
let timerInterval = null;
let totalPairs = 0;
let matchedCount = 0;
let currentTheme = 'smeshariki';
let currentLevel = 0;

function updateStatsUI() {
  statsDiv.innerHTML = `Ходы: ${moves} | Время: ${seconds}с`;
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
}

function startTimer() {
  if (timerInterval) stopTimer();
  seconds = 0;
  updateStatsUI();
  timerInterval = setInterval(() => { seconds++; updateStatsUI(); }, 1000);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function winGame() {
  stopTimer();
  const themeName = themeSelect.value;
  completeLevel(themeName, currentLevel);
  setTimeout(() => {
    alert(`🎉 Победа! Ходов: ${moves}, время: ${seconds} сек`);
  }, 100);
}

function onCardClick(idx) {
  if (lockBoard) return;
  const card = cards[idx];
  if (card.matched) return;
  if (card.flipped) return;
  
  card.flipped = true;
  card.element.textContent = card.emoji;
  card.element.style.backgroundColor = '#ffaa33';
  
  if (firstIndex === null) {
    firstIndex = idx;
    return;
  }
  
  if (secondIndex === null && firstIndex !== idx) {
    secondIndex = idx;
    moves++;
    updateStatsUI();
    
    const card1 = cards[firstIndex];
    const card2 = cards[secondIndex];
    
    if (card1.emoji === card2.emoji) {
      card1.matched = true;
      card2.matched = true;
      card1.flipped = false;
      card2.flipped = false;
      card1.element.classList.add('matched');
      card2.element.classList.add('matched');
      matchedCount++;
      
      firstIndex = null;
      secondIndex = null;
      
      if (matchedCount === totalPairs) {
        winGame();
      }
    } else {
      lockBoard = true;
      setTimeout(() => {
        card1.flipped = false;
        card2.flipped = false;
        card1.element.textContent = '❓';
        card2.element.textContent = '❓';
        card1.element.style.backgroundColor = '#2c3e50';
        card2.element.style.backgroundColor = '#2c3e50';
        firstIndex = null;
        secondIndex = null;
        lockBoard = false;
      }, 700);
    }
  }
}

function initGame() {
  currentTheme = themeSelect.value;
  currentLevel = parseInt(document.getElementById('levelSelect').value);
  const level = LEVELS[currentLevel];
  const [cols, rows] = level.size.split('x').map(Number);
  totalPairs = level.pairs;
  
  const themeData = THEMES[currentTheme];
  const availableEmojis = themeData.chars;
  
  let pool = [];
  for (let i = 0; i < totalPairs; i++) {
    const emoji = availableEmojis[i % availableEmojis.length];
    pool.push(emoji, emoji);
  }
  pool = shuffleArray(pool);
  
  gridDiv.innerHTML = '';
  gridDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  
  cards = [];
  matchedCount = 0;
  firstIndex = null;
  secondIndex = null;
  lockBoard = false;
  moves = 0;
  updateStatsUI();
  stopTimer();
  startTimer();
  
  for (let i = 0; i < pool.length; i++) {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'card';
    cardDiv.textContent = '❓';
    cardDiv.style.backgroundColor = '#2c3e50';
    cardDiv.style.fontSize = window.innerWidth < 450 ? '24px' : '32px';
    cardDiv.onclick = (function(idx) { return function() { onCardClick(idx); }; })(i);
    gridDiv.appendChild(cardDiv);
    
    cards.push({
      emoji: pool[i],
      matched: false,
      flipped: false,
      element: cardDiv
    });
  }
}

// Инициализация прогресса для всех мультфильмов
for (let theme in THEMES) {
  if (!levelProgress[theme]) {
    levelProgress[theme] = {};
    levelProgress[theme][LEVELS[0].id] = true;
  }
}
saveProgress();

themeSelect.addEventListener('change', () => {
  updateLevelSelect();
  initGame();
});
document.getElementById('levelSelect').addEventListener('change', () => initGame());
startBtn.addEventListener('click', () => initGame());

updateLevelSelect();
initGame();
</script>
</body>
</html>
