<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Линия памяти</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    button {
      background: #ff7b4f;
      border: 2px solid #ffaa33;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .level-selector { text-align: center; margin-bottom: 15px; }
    .level-btn {
      background: #1e3a5f;
      margin: 0 5px;
      padding: 8px 15px;
      font-size: 14px;
    }
    .level-btn.active { background: #ff7b4f; border-color: #ffd966; }
    .level-btn.locked { opacity: 0.5; cursor: not-allowed; }
    .memory-grid {
      display: grid;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 32px;
    }
    .card {
      aspect-ratio: 1 / 1;
      background-color: #2c3e50;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 6px 0 #0f1a24;
    }
    .card.matched { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; }
    .stats { background: #0a1e2c; border-radius: 40px; padding: 12px; display: flex; justify-content: space-between; gap: 15px; font-size: 16px; font-weight: bold; color: #ffd966; margin: 15px 0; flex-wrap: wrap; }
    .theme-info { text-align: center; margin-bottom: 10px; font-size: 18px; font-weight: bold; color: #ffd966; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    @media (max-width: 480px) { .card { font-size: 24px; } .stats { font-size: 12px; } .level-btn { padding: 5px 10px; font-size: 12px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🧠 Линия памяти</h1>
  
  <div class="level-selector" id="levelSelector"></div>
  
  <div class="controls">
    <button id="startBtn">🎮 Новая игра</button>
  </div>
  
  <div id="themeInfo" class="theme-info">🎬 Загрузка...</div>
  <div id="grid" class="memory-grid"></div>
  
  <div id="stats" class="stats">
    <span>🃏 Ходы: 0</span>
    <span>⏱️ Время: 0с</span>
    <span>🪙 Монетки: <span id="coinsCount">0</span></span>
  </div>
  
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
// ==================== УРОВНИ СЛОЖНОСТИ ====================
const LEVELS = [
  { id: 0, size: '4x2', name: 'Лёгкий', cols: 4, rows: 2, pairs: 4 },
  { id: 1, size: '4x3', name: 'Средний', cols: 4, rows: 3, pairs: 6 },
  { id: 2, size: '4x4', name: 'Сложный', cols: 4, rows: 4, pairs: 8 },
  { id: 3, size: '4x5', name: 'Эксперт', cols: 4, rows: 5, pairs: 10 },
  { id: 4, size: '4x6', name: 'Мастер', cols: 4, rows: 6, pairs: 12 }
];

// ==================== ВСЕ МУЛЬТФИЛЬМЫ И ПЕРСОНАЖИ ====================
const ALL_THEMES = [
  { name: 'Смешарики', icon: '🐰', chars: [
    { name: 'Крош', emoji: '🐰', color: '#FF69B4', reward: 'Крош' },
    { name: 'Ёжик', emoji: '🦔', color: '#8B4513', reward: 'Ёжик' },
    { name: 'Нюша', emoji: '🐷', color: '#FFB6C1', reward: 'Нюша' },
    { name: 'Бараш', emoji: '🐑', color: '#87CEEB', reward: 'Бараш' },
    { name: 'Лосяш', emoji: '🦌', color: '#FFD700', reward: 'Лосяш' }
  ]},
  { name: 'Простоквашино', icon: '🐱', chars: [
    { name: 'Матроскин', emoji: '🐱', color: '#FFA500', reward: 'Матроскин' },
    { name: 'Шарик', emoji: '🐶', color: '#DEB887', reward: 'Шарик' },
    { name: 'Дядя Фёдор', emoji: '👦', color: '#98FB98', reward: 'Дядя Фёдор' },
    { name: 'Печкин', emoji: '📮', color: '#708090', reward: 'Печкин' },
    { name: 'Галчонок', emoji: '🐦', color: '#000000', reward: 'Галчонок' }
  ]},
  { name: 'Фиксики', icon: '🔧', chars: [
    { name: 'Нолик', emoji: '0️⃣', color: '#00BFFF', reward: 'Нолик' },
    { name: 'Симка', emoji: '1️⃣', color: '#FF69B4', reward: 'Симка' },
    { name: 'Папус', emoji: '👨', color: '#4169E1', reward: 'Папус' },
    { name: 'Мася', emoji: '👩', color: '#FFA500', reward: 'Мася' },
    { name: 'Дедус', emoji: '👴', color: '#708090', reward: 'Дедус' }
  ]},
  { name: 'Винни Пух', icon: '🐻', chars: [
    { name: 'Винни', emoji: '🐻', color: '#CD853F', reward: 'Винни' },
    { name: 'Пятачок', emoji: '🐖', color: '#FFB6C1', reward: 'Пятачок' },
    { name: 'Кролик', emoji: '🐇', color: '#87CEEB', reward: 'Кролик' },
    { name: 'Иа', emoji: '🐴', color: '#708090', reward: 'Иа' },
    { name: 'Сова', emoji: '🦉', color: '#9370DB', reward: 'Сова' }
  ]},
  { name: 'Маша и Медведь', icon: '👧', chars: [
    { name: 'Маша', emoji: '👧', color: '#FF69B4', reward: 'Маша' },
    { name: 'Медведь', emoji: '🐻', color: '#8B4513', reward: 'Медведь' },
    { name: 'Панда', emoji: '🐼', color: '#000000', reward: 'Панда' },
    { name: 'Розочка', emoji: '🌸', color: '#FFB6C1', reward: 'Розочка' },
    { name: 'Зайка', emoji: '🐰', color: '#87CEEB', reward: 'Зайка' }
  ]}
];

// ==================== ПРОГРЕСС ====================
let levelProgress = JSON.parse(localStorage.getItem('memory_level_progress')) || {
  currentLevel: 0,
  completedLevels: [false, false, false, false, false],
  collectedCharacters: {} // { themeName: [false,false,false,false,false] }
};

let coins = JSON.parse(localStorage.getItem('memory_coins')) || 0;

function saveProgress() {
  localStorage.setItem('memory_level_progress', JSON.stringify(levelProgress));
  localStorage.setItem('memory_coins', JSON.stringify(coins));
  document.getElementById('coinsCount').textContent = coins;
}

// Инициализация собранных персонажей
for (let theme of ALL_THEMES) {
  if (!levelProgress.collectedCharacters[theme.name]) {
    levelProgress.collectedCharacters[theme.name] = [false, false, false, false, false];
  }
}

// ==================== ВЫБОР УРОВНЯ ====================
function renderLevelSelector() {
  const container = document.getElementById('levelSelector');
  container.innerHTML = '';
  LEVELS.forEach((level, idx) => {
    const btn = document.createElement('button');
    btn.textContent = `${level.name} (${level.size})`;
    btn.className = 'level-btn';
    if (idx === levelProgress.currentLevel) btn.classList.add('active');
    if (idx > levelProgress.currentLevel && !levelProgress.completedLevels[idx-1]) {
      btn.classList.add('locked');
      btn.disabled = true;
    }
    btn.onclick = () => {
      if (!btn.disabled) {
        levelProgress.currentLevel = idx;
        saveProgress();
        renderLevelSelector();
        initGame();
      }
    };
    container.appendChild(btn);
  });
}

// ==================== ВЫБОР СЛУЧАЙНЫХ ПЕРСОНАЖЕЙ ====================
function getRandomCharacters() {
  const level = LEVELS[levelProgress.currentLevel];
  const neededCharacters = level.pairs; // нужно 4,6,8,10,12 пар = столько же персонажей
  
  // Собираем всех доступных персонажей
  let allCharacters = [];
  for (let theme of ALL_THEMES) {
    for (let i = 0; i < theme.chars.length; i++) {
      allCharacters.push({
        themeName: theme.name,
        themeIcon: theme.icon,
        charIndex: i,
        char: theme.chars[i]
      });
    }
  }
  
  // Перемешиваем
  for (let i = allCharacters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allCharacters[i], allCharacters[j]] = [allCharacters[j], allCharacters[i]];
  }
  
  // Берём нужное количество
  const selected = allCharacters.slice(0, neededCharacters);
  
  // Для каждого персонажа создаём 2 карточки
  let pool = [];
  for (let s of selected) {
    pool.push({ ...s });
    pool.push({ ...s });
  }
  
  // Перемешиваем карточки
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  
  return { pool, selected };
}

// ==================== ВЫДАЧА НАГРАДЫ ====================
function giveReward(themeName, charIndex) {
  const collected = levelProgress.collectedCharacters[themeName];
  if (!collected[charIndex]) {
    // Новая фигурка
    collected[charIndex] = true;
    saveProgress();
    setTimeout(() => {
      alert(`🎁 ПОЛУЧЕНА НОВАЯ ФИГУРКА!\n\n${themeName} - ${ALL_THEMES.find(t => t.name === themeName).chars[charIndex].reward}\n\nЗагляни в Музей метро!`);
    }, 300);
    return true;
  } else {
    // Уже есть — даём монетку
    coins++;
    saveProgress();
    setTimeout(() => {
      alert(`🪙 ПОЛУЧЕНА МОНЕТКА!\n\nУ тебя уже есть эта фигурка.\n+1 монетка (всего: ${coins})`);
    }, 300);
    return false;
  }
}

// ==================== ПРОВЕРКА ЗАВЕРШЕНИЯ УРОВНЯ ====================
function checkLevelComplete() {
  // Проверяем, собраны ли все персонажи на этом уровне
  const levelPairs = LEVELS[levelProgress.currentLevel].pairs;
  // Это сложно отследить, поэтому просто отмечаем уровень пройденным после победы
  if (!levelProgress.completedLevels[levelProgress.currentLevel]) {
    levelProgress.completedLevels[levelProgress.currentLevel] = true;
    if (levelProgress.currentLevel + 1 < LEVELS.length) {
      levelProgress.currentLevel++;
    }
    saveProgress();
    renderLevelSelector();
    setTimeout(() => {
      alert(`🎉 УРОВЕНЬ ПРОЙДЕН!\n\nОткрыт следующий уровень сложности!`);
    }, 500);
  }
}

// ==================== ИГРОВАЯ МЕХАНИКА ====================
const gridDiv = document.getElementById('grid');
const startBtn = document.getElementById('startBtn');
const statsDiv = document.getElementById('stats');
const themeInfoDiv = document.getElementById('themeInfo');

let cards = [];
let lockBoard = false;
let firstIndex = null;
let secondIndex = null;
let moves = 0;
let seconds = 0;
let timerInterval = null;
let totalPairs = 0;
let matchedCount = 0;
let currentPool = [];
let currentSelected = [];

function updateStatsUI() {
  statsDiv.innerHTML = `<span>🃏 Ходы: ${moves}</span><span>⏱️ Время: ${seconds}с</span><span>🪙 Монетки: ${coins}</span>`;
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
}

function startTimer() {
  if (timerInterval) stopTimer();
  seconds = 0;
  updateStatsUI();
  timerInterval = setInterval(() => { seconds++; updateStatsUI(); }, 1000);
}

function winGame() {
  stopTimer();
  
  // Выдаём награды за каждого персонажа
  const uniqueChars = new Map();
  for (let s of currentSelected) {
    const key = `${s.themeName}_${s.charIndex}`;
    if (!uniqueChars.has(key)) {
      uniqueChars.set(key, s);
      giveReward(s.themeName, s.charIndex);
    }
  }
  
  checkLevelComplete();
  
  setTimeout(() => {
    alert(`🎉 Победа! Ходов: ${moves}, время: ${seconds} сек`);
  }, 100);
}

function onCardClick(idx) {
  if (lockBoard) return;
  const card = cards[idx];
  if (card.matched) return;
  if (card.flipped) return;
  
  card.flipped = true;
  card.element.textContent = card.char.emoji;
  card.element.style.backgroundColor = card.char.color;
  
  if (firstIndex === null) {
    firstIndex = idx;
    return;
  }
  
  if (secondIndex === null && firstIndex !== idx) {
    secondIndex = idx;
    moves++;
    updateStatsUI();
    
    const card1 = cards[firstIndex];
    const card2 = cards[secondIndex];
    
    if (card1.char.name === card2.char.name && card1.themeName === card2.themeName) {
      card1.matched = true;
      card2.matched = true;
      card1.flipped = false;
      card2.flipped = false;
      card1.element.classList.add('matched');
      card2.element.classList.add('matched');
      matchedCount++;
      
      firstIndex = null;
      secondIndex = null;
      
      if (matchedCount === totalPairs) {
        winGame();
      }
    } else {
      lockBoard = true;
      setTimeout(() => {
        card1.flipped = false;
        card2.flipped = false;
        card1.element.textContent = '❓';
        card2.element.textContent = '❓';
        card1.element.style.backgroundColor = '#2c3e50';
        card2.element.style.backgroundColor = '#2c3e50';
        firstIndex = null;
        secondIndex = null;
        lockBoard = false;
      }, 700);
    }
  }
}

function initGame() {
  const level = LEVELS[levelProgress.currentLevel];
  const { pool, selected } = getRandomCharacters();
  currentPool = pool;
  currentSelected = selected;
  totalPairs = level.pairs;
  
  const cols = level.cols;
  const rows = level.rows;
  
  gridDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  gridDiv.style.gap = '8px';
  
  // Показываем информацию о теме (первые 2 персонажа для примера)
  const themesList = [...new Set(selected.map(s => s.themeName))];
  themeInfoDiv.innerHTML = `🎬 Уровень: ${level.name} | Персонажи: ${themesList.join(', ')}`;
  
  cards = [];
  matchedCount = 0;
  firstIndex = null;
  secondIndex = null;
  lockBoard = false;
  moves = 0;
  updateStatsUI();
  stopTimer();
  startTimer();
  
  gridDiv.innerHTML = '';
  
  for (let i = 0; i < pool.length; i++) {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'card';
    cardDiv.textContent = '❓';
    cardDiv.style.backgroundColor = '#2c3e50';
    cardDiv.style.fontSize = window.innerWidth < 450 ? '24px' : '32px';
    cardDiv.onclick = (function(idx) { return function() { onCardClick(idx); }; })(i);
    gridDiv.appendChild(cardDiv);
    
    cards.push({
      themeName: pool[i].themeName,
      char: pool[i].char,
      matched: false,
      flipped: false,
      element: cardDiv
    });
  }
}

startBtn.addEventListener('click', () => initGame());
renderLevelSelector();
initGame();
saveProgress();
</script>
</body>
</html>
