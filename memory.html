<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Линия памяти</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    select, button {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
    button { background: #ff7b4f; border-color: #ffaa33; }
    .memory-grid {
      display: grid;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 32px;
    }
    .card {
      aspect-ratio: 1 / 1;
      background-color: #2c3e50;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 0 6px 0 #0f1a24;
    }
    .card.matched { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; }
    .stats {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 12px 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 18px;
      font-weight: bold;
      color: #ffd966;
      margin: 15px 0;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #b0e0ff;
      text-decoration: none;
      font-weight: bold;
      background: #1e3a5f;
      padding: 10px;
      border-radius: 40px;
      border: 2px solid #4f9fff;
    }
    @media (max-width: 480px) { .card { font-size: 24px; } .stats { font-size: 14px; gap: 15px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🧠 Линия памяти</h1>
  <div class="controls">
    <select id="themeSelect">
      <option value="smeshariki">Смешарики</option>
      <option value="prostokvashino">Простоквашино</option>
      <option value="fixiki">Фиксики</option>
      <option value="vinni">Винни Пух</option>
      <option value="masha">Маша и Медведь</option>
    </select>
    <select id="levelSelect">
      <option value="4x2">Лёгкий (4×2) - 8 карт</option>
      <option value="4x3">Средний (4×3) - 12 карт</option>
      <option value="4x4">Сложный (4×4) - 16 карт</option>
      <option value="4x5">Эксперт (4×5) - 20 карт</option>
      <option value="4x6">Мастер (4×6) - 24 карты</option>
    </select>
    <button id="startBtn">Старт</button>
  </div>
  <div id="grid" class="memory-grid"></div>
  <div id="stats" class="stats">Ходы: 0 | Время: 0с</div>
  <a href="index.html" class="back">⬅ На главную</a>
</div>
<script>
  (function(){
    // Данные мультиков
    const THEMES = {
      smeshariki: ['🐰', '🦔', '🐷', '🐑', '🦌', '🐻', '🦉', '🐧'],
      prostokvashino: ['🐱', '🐶', '👦', '📮', '🐦', '🐄', '👩', '🦫'],
      fixiki: ['0️⃣', '1️⃣', '👨', '👩', '👴', '🔧', '🧵', '🔩'],
      vinni: ['🐻', '🐖', '🐇', '🐴', '🦉', '🐯', '🦘', '👶'],
      masha: ['👧', '🐻', '🐼', '🌸', '🐰', '🐺', '🐿️', '🦔']
    };
    
    const gridDiv = document.getElementById('grid');
    const themeSelect = document.getElementById('themeSelect');
    const levelSelect = document.getElementById('levelSelect');
    const startBtn = document.getElementById('startBtn');
    const statsDiv = document.getElementById('stats');
    
    let cards = [];
    let lockBoard = false;
    let firstIndex = null;
    let secondIndex = null;
    let moves = 0;
    let seconds = 0;
    let timerInterval = null;
    let totalPairs = 0;
    let matchedCount = 0;
    
    function updateStatsUI() {
      statsDiv.innerHTML = `Ходы: ${moves} | Время: ${seconds}с`;
    }
    
    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
    }
    
    function startTimer() {
      if (timerInterval) stopTimer();
      seconds = 0;
      updateStatsUI();
      timerInterval = setInterval(() => { seconds++; updateStatsUI(); }, 1000);
    }
    
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function winGame() {
      stopTimer();
      setTimeout(() => {
        alert(`🎉 Победа! Ходов: ${moves}, время: ${seconds} сек`);
      }, 50);
    }
    
    function onCardClick(idx) {
      if (lockBoard) return;
      const card = cards[idx];
      if (card.matched) return;
      if (card.flipped) return;
      
      card.flipped = true;
      card.element.textContent = card.emoji;
      card.element.style.backgroundColor = '#ffaa33';
      
      if (firstIndex === null) {
        firstIndex = idx;
        return;
      }
      
      if (secondIndex === null && firstIndex !== idx) {
        secondIndex = idx;
        moves++;
        updateStatsUI();
        
        const card1 = cards[firstIndex];
        const card2 = cards[secondIndex];
        
        if (card1.emoji === card2.emoji) {
          card1.matched = true;
          card2.matched = true;
          card1.flipped = false;
          card2.flipped = false;
          card1.element.classList.add('matched');
          card2.element.classList.add('matched');
          matchedCount++;
          
          firstIndex = null;
          secondIndex = null;
          
          if (matchedCount === totalPairs) {
            winGame();
          }
        } else {
          lockBoard = true;
          setTimeout(() => {
            card1.flipped = false;
            card2.flipped = false;
            card1.element.textContent = '❓';
            card2.element.textContent = '❓';
            card1.element.style.backgroundColor = '#2c3e50';
            card2.element.style.backgroundColor = '#2c3e50';
            firstIndex = null;
            secondIndex = null;
            lockBoard = false;
          }, 700);
        }
      }
    }
    
    function initGame() {
      const theme = themeSelect.value;
      const size = levelSelect.value;
      const [cols, rows] = size.split('x').map(Number);
      const totalCards = cols * rows;
      totalPairs = totalCards / 2;
      
      const availableEmojis = THEMES[theme];
      if (!availableEmojis) return;
      
      let pool = [];
      for (let i = 0; i < totalPairs; i++) {
        const emoji = availableEmojis[i % availableEmojis.length];
        pool.push(emoji, emoji);
      }
      pool = shuffleArray(pool);
      
      gridDiv.innerHTML = '';
      gridDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      
      cards = [];
      matchedCount = 0;
      firstIndex = null;
      secondIndex = null;
      lockBoard = false;
      moves = 0;
      updateStatsUI();
      stopTimer();
      startTimer();
      
      for (let i = 0; i < pool.length; i++) {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card';
        cardDiv.textContent = '❓';
        cardDiv.style.backgroundColor = '#2c3e50';
        cardDiv.style.fontSize = window.innerWidth < 450 ? '24px' : '32px';
        cardDiv.onclick = (function(idx) { return function() { onCardClick(idx); }; })(i);
        gridDiv.appendChild(cardDiv);
        
        cards.push({
          emoji: pool[i],
          matched: false,
          flipped: false,
          element: cardDiv
        });
      }
    }
    
    startBtn.addEventListener('click', () => initGame());
    themeSelect.addEventListener('change', () => initGame());
    levelSelect.addEventListener('change', () => initGame());
    
    initGame();
  })();
</script>
</body>
</html>
