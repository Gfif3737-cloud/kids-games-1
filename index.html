<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игры в метро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(145deg, #8b0000, #5a0000);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.5s ease;
      position: relative;
    }
    /* Основной красный фон */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 0;
    }
    /* Полупрозрачные наложения (покупаемые фоны) */
    body.overlay-default::before { opacity: 0; }
    body.overlay-airport::before { 
      background: radial-gradient(circle at 20% 40%, rgba(255,215,0,0.15) 0%, transparent 50%);
      opacity: 1;
    }
    body.overlay-mayakovskaya::before { 
      background: repeating-linear-gradient(45deg, rgba(255,215,0,0.1) 0px, rgba(255,215,0,0.1) 2px, transparent 2px, transparent 8px);
      opacity: 1;
    }
    body.overlay-kievskaya::before { 
      background: radial-gradient(ellipse at 70% 60%, rgba(255,100,50,0.2) 0%, transparent 70%);
      opacity: 1;
    }
    body.overlay-komsomolskaya::before { 
      background: repeating-linear-gradient(90deg, rgba(255,215,0,0.08) 0px, rgba(255,215,0,0.08) 3px, transparent 3px, transparent 15px);
      opacity: 1;
    }
    body.overlay-revolution::before { 
      background: radial-gradient(circle at 50% 50%, rgba(255,200,50,0.12) 0%, transparent 60%);
      opacity: 1;
    }
    
    .container {
      max-width
