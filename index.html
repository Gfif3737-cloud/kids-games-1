<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игры в метро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(145deg, #8b0000, #5a0000);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      transition: background-image 0.5s ease;
    }
    body.station-bg {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }
    body.station-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }
    
    .container {
      max-width: 350px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #ffd966;
      text-shadow: 0 0 10px #ffb347;
    }
    .description {
      background: rgba(0,0,0,0.5);
      border-radius: 30px;
      padding: 10px 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #ffd966;
      backdrop-filter: blur(4px);
    }
    .coins-display {
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      padding: 8px 16px;
      margin-bottom: 20px;
      display: inline-block;
      font-size: 18px;
      font-weight: bold;
      color: #ffd966;
      border: 2px solid #ffaa33;
      backdrop-filter: blur(4px);
    }
    .coins-display span {
      font-size: 26px;
      color: #ffaa33;
    }
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 15px 0;
    }
    .btn {
      display: block;
      padding: 14px 16px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border-radius: 40px;
      transition: 0.3s;
      text-align: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
    .memory { background: #ff7b4f; border: 2px solid #ffaa33; }
    .maze { background: #8b0000; border: 2px solid #ffaa33; }
    .match3 { background: #1e3a5f; border: 2px solid #4f9fff; }
    .museum { background: #4a2c00; border: 2px solid #ffd966; }
    .builder { background: #2d6a4f; border: 2px solid #ffaa33; }
    
    .shop-btn {
      background: #6a1a4f;
      border: 2px solid #ffaa33;
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      margin: 5px 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .shop-btn:hover { background: #8a2a6f; }
    
    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,215,0,0.3);
    }
    .logo {
      text-align: center;
      font-size: 10px;
      color: #ffd966;
      opacity: 0.8;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin-bottom: 6px;
    }
    .logo-text {
      font-size: 9px;
      line-height: 1.3;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1a2a3f;
      border-radius: 32px;
      padding: 20px;
      max-width: 320px;
      width: 85%;
      text-align: center;
      border: 2px solid #ffb347;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-content h2 { color: #ffd966; margin-bottom: 15px; font-size: 20px; }
    .style-item {
      background: #0a1e2c;
      border-radius: 20px;
      padding: 15px;
      margin: 12px 0;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
    }
    .style-item:hover { background: #1a3a5f; transform: scale(1.02); }
    .style-item.owned { background: #2d6a4f; opacity: 0.9; }
    .style-name { font-weight: bold; font-size: 16px; color: #ffd966; margin-bottom: 8px; }
    .style-price { font-size: 12px; color: #ffaa33; margin-bottom: 8px; }
    .style-stations { font-size: 11px; color: #a8e6ff; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,215,0,0.2); }
    .style-stations span { display: inline-block; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 15px; margin: 2px; }
    .close-modal {
      background: #ff7b4f;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      color: white;
      margin-top: 15px;
      cursor: pointer;
    }
    .current-bg {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      margin-top: 10px;
      display: inline-block;
    }
    @media (max-width: 500px) {
      h1 { font-size: 24px; }
      .btn { font-size: 14px; padding: 12px; }
      .coins-display { font-size: 14px; }
      .coins-display span { font-size: 22px; }
      .logo-icon { width: 40px; height: 40px; }
      .logo-text { font-size: 8px; }
    }
  </style>
</head>
<body id="mainBody">
<div class="container">
  <h1>🚇 ИГРЫ В МЕТРО</h1>
  
  <div class="description">
    🏆 Собирай персонажей, получай монетки, строй метро и открывай историю!
  </div>
  
  <div class="coins-display">
    🪙 Монеток: <span id="globalCoins">0</span>
  </div>
  
  <button class="shop-btn" id="shopBtn">🎨 Магазин стилей</button>
  <div id="currentStyleDisplay" class="current-bg"></div>
  
  <div class="menu">
    <a href="memory.html" class="btn memory">🧠 Линия памяти</a>
    <a href="maze.html" class="btn maze">🌀 Лабиринт</a>
    <a href="match3.html" class="btn match3">💎 Три в ряд</a>
    <a href="builder.html" class="btn builder">🏗️ Строительство метро</a>
    <a href="museum.html" class="btn museum">🏛️ Музей метро</a>
  </div>
  
  <div class="logos">
    <div class="logo">
      <img src="images/Logo_metro.PNG" alt="Московский метрополитен" class="logo-icon">
      <div class="logo-text">Московский<br>метрополитен</div>
    </div>
    <div class="logo">
      <img src="images/Logo_kmt.PNG" alt="Колледж Московского транспорта" class="logo-icon">
      <div class="logo-text">Колледж<br>Московского транспорта</div>
    </div>
  </div>
</div>

<div id="shopModal" class="modal">
  <div class="modal-content">
    <h2>🎨 Магазин стилей</h2>
    <p>Выбери стиль оформления (50 🪙)</p>
    <div id="shopList"></div>
    <button class="close-modal" id="closeShopBtn">Закрыть</button>
  </div>
</div>

<script>
const BASE_URL = 'https://gfif3737-cloud.github.io/kids-games-1/images/';

// ==================== СТИЛИ И СТАНЦИИ (ТВОИ ФОТО) ====================
const STYLES = [
  { 
    id: 'classic', 
    name: 'Классический стиль', 
    price: 50, 
    owned: false,
    stations: [
      { name: 'Площадь Революции', img: BASE_URL + 'PI_Revolitii.WEBP' },
      { name: 'Кропоткинская', img: BASE_URL + 'Krapotkinskay.WEBP' },
      { name: 'Таганская', img: BASE_URL + 'Tagnskay.WEBP' }
    ]
  },
  { 
    id: 'modern', 
    name: 'Современный стиль', 
    price: 50, 
    owned: false,
    stations: [
      { name: 'Сретенский бульвар', img: BASE_URL + 'Sretehnski_Bulivar.WEBP' },
      { name: 'Парк Победы', img: BASE_URL + 'Park_Pobedi.WEBP' },
      { name: 'Деловой центр', img: BASE_URL + 'Delovoi_center.WEBP' }
    ]
  },
  { 
    id: 'unique', 
    name: 'Уникальный стиль', 
    price: 50, 
    owned: false,
    stations: [
      { name: 'Зябликово', img: BASE_URL + 'Zablikovo.WEBP' }
    ]
  },
  { 
    id: 'light', 
    name: 'Светлый стиль', 
    price: 50, 
    owned: false,
    stations: [
      { name: 'Бунинская аллея', img: BASE_URL + 'Buninskay_Alley.WEBP' },
      { name: 'Шипиловская', img: BASE_URL + 'Shipilovskay.WEBP' }
    ]
  }
];

let ownedStyles = JSON.parse(localStorage.getItem('owned_styles')) || [];
let currentStyleId = localStorage.getItem('current_style') || null;
let currentStationIndex = parseInt(localStorage.getItem('current_station_index') || '0');

function updateCoins() {
  const coins = localStorage.getItem('memory_coins') || 0;
  document.getElementById('globalCoins').textContent = coins;
}

function getRandomStation(style) {
  if (!style || !style.stations || style.stations.length === 0) return null;
  const randomIndex = Math.floor(Math.random() * style.stations.length);
  currentStationIndex = randomIndex;
  localStorage.setItem('current_station_index', currentStationIndex);
  return style.stations[randomIndex];
}

function applyBackground() {
  const body = document.getElementById('mainBody');
  if (!currentStyleId) {
    body.style.background = 'linear-gradient(145deg, #8b0000, #5a0000)';
    body.style.backgroundImage = '';
    document.getElementById('currentStyleDisplay').innerHTML = '';
    return;
  }
  
  const style = STYLES.find(s => s.id === currentStyleId);
  if (!style) return;
  
  const station = style.stations[currentStationIndex] || getRandomStation(style);
  if (station && station.img) {
    body.style.background = `linear-gradient(145deg, rgba(139,0,0,0.7), rgba(90,0,0,0.7)), url('${station.img}')`;
    body.style.backgroundSize = 'cover';
    body.style.backgroundPosition = 'center';
    body.style.backgroundRepeat = 'no-repeat';
    document.getElementById('currentStyleDisplay').innerHTML = `🎨 Текущий фон: ${style.name} — ${station.name}`;
  }
}

function changeRandomStation() {
  if (!currentStyleId) return;
  const style = STYLES.find(s => s.id === currentStyleId);
  if (style) {
    const newStation = getRandomStation(style);
    applyBackground();
  }
}

function saveOwnedStyles() {
  localStorage.setItem('owned_styles', JSON.stringify(ownedStyles));
  localStorage.setItem('current_style', currentStyleId);
}

function buyStyle(styleId, price) {
  let coins = parseInt(localStorage.getItem('memory_coins') || '0');
  if (coins >= price && !ownedStyles.includes(styleId)) {
    coins -= price;
    localStorage.setItem('memory_coins', coins);
    ownedStyles.push(styleId);
    saveOwnedStyles();
    updateCoins();
    renderShop();
    alert(`✅ Стиль «${STYLES.find(s => s.id === styleId).name}» куплен!`);
    return true;
  } else if (ownedStyles.includes(styleId)) {
    alert(`❌ У вас уже есть этот стиль!`);
    return false;
  } else {
    alert(`❌ Не хватает монет! Нужно ${price} 🪙`);
    return false;
  }
}

function selectStyle(styleId) {
  if (ownedStyles.includes(styleId)) {
    currentStyleId = styleId;
    const style = STYLES.find(s => s.id === styleId);
    getRandomStation(style);
    saveOwnedStyles();
    applyBackground();
    renderShop();
    alert(`✅ Стиль «${style.name}» применён! Фон будет меняться случайно.`);
  } else {
    alert(`❌ Сначала купите этот стиль в магазине!`);
  }
}

function renderShop() {
  const container = document.getElementById('shopList');
  if (!container) return;
  container.innerHTML = '';
  
  for (const style of STYLES) {
    const isOwned = ownedStyles.includes(style.id);
    const isCurrent = currentStyleId === style.id;
    
    const item = document.createElement('div');
    item.className = `style-item ${isOwned ? 'owned' : ''}`;
    
    const stationsHtml = style.stations.map(s => `<span>🚇 ${s.name}</span>`).join('');
    
    item.innerHTML = `
      <div class="style-name">${style.name} ${isCurrent ? '✅' : ''}</div>
      <div class="style-price">${style.price === 0 ? 'Бесплатно' : style.price + ' 🪙'}</div>
      <div class="style-stations">🎨 Станции: ${stationsHtml}</div>
    `;
    
    if (!isOwned && style.price > 0) {
      item.onclick = () => buyStyle(style.id, style.price);
    } else if (isOwned && !isCurrent) {
      item.onclick = () => selectStyle(style.id);
    } else if (isOwned && isCurrent) {
      item.style.cursor = 'pointer';
      const randomBtn = document.createElement('div');
      randomBtn.style.marginTop = '8px';
      randomBtn.style.fontSize = '11px';
      randomBtn.style.color = '#ffaa33';
      randomBtn.innerHTML = '🎲 Случайная станция';
      randomBtn.onclick = (e) => {
        e.stopPropagation();
        changeRandomStation();
      };
      item.appendChild(randomBtn);
    }
    
    container.appendChild(item);
  }
}

const modal = document.getElementById('shopModal');
document.getElementById('shopBtn').onclick = () => { renderShop(); modal.style.display = 'flex'; };
document.getElementById('closeShopBtn').onclick = () => { modal.style.display = 'none'; };
window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

updateCoins();
setInterval(updateCoins, 1000);
applyBackground();
</script>
</body>
</html>
