<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игры в метро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(145deg, #8b0000, #5a0000);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 0;
    }
    body.overlay-default::before { opacity: 0; }
    body.overlay-airport::before { background: radial-gradient(circle at 20% 40%, rgba(255,215,0,0.15) 0%, transparent 50%); opacity: 1; }
    body.overlay-mayakovskaya::before { background: repeating-linear-gradient(45deg, rgba(255,215,0,0.1) 0px, rgba(255,215,0,0.1) 2px, transparent 2px, transparent 8px); opacity: 1; }
    body.overlay-kievskaya::before { background: radial-gradient(ellipse at 70% 60%, rgba(255,100,50,0.2) 0%, transparent 70%); opacity: 1; }
    body.overlay-komsomolskaya::before { background: repeating-linear-gradient(90deg, rgba(255,215,0,0.08) 0px, rgba(255,215,0,0.08) 3px, transparent 3px, transparent 15px); opacity: 1; }
    body.overlay-revolution::before { background: radial-gradient(circle at 50% 50%, rgba(255,200,50,0.12) 0%, transparent 60%); opacity: 1; }
    
    .container {
      max-width: 350px;
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 25px 20px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.3);
      text-align: center;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 15px;
      color: #ffd966;
      text-shadow: 0 0 10px #ffb347;
    }
    .coins-display {
      background: rgba(10, 30, 44, 0.8);
      border-radius: 40px;
      padding: 8px 16px;
      margin-bottom: 15px;
      display: inline-block;
      font-size: 18px;
      font-weight: bold;
      color: #ffd966;
      border: 2px solid #ffaa33;
    }
    .coins-display span {
      font-size: 26px;
      color: #ffaa33;
    }
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 15px 0;
    }
    .btn {
      display: block;
      padding: 12px 16px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border-radius: 40px;
      transition: 0.3s;
      text-align: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
    .memory { background: #ff7b4f; border: 2px solid #ffaa33; }
    .maze { background: #8b0000; border: 2px solid #ffaa33; }
    .match3 { background: #1e3a5f; border: 2px solid #4f9fff; }
    .museum { background: #4a2c00; border: 2px solid #ffd966; }
    .builder { background: #2d6a4f; border: 2px solid #ffaa33; }
    
    .shop-btn {
      background: #6a1a4f;
      border: 2px solid #ffaa33;
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      margin: 5px 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .shop-btn:hover { background: #8a2a6f; }
    
    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,215,0,0.3);
    }
    .logo {
      text-align: center;
      font-size: 10px;
      color: #ffd966;
      opacity: 0.8;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin-bottom: 6px;
    }
    .logo-text {
      font-size: 9px;
      line-height: 1.3;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1a2a3f;
      border-radius: 32px;
      padding: 20px;
      max-width: 320px;
      width: 85%;
      text-align: center;
      border: 2px solid #ffb347;
    }
    .modal-content h2 { color: #ffd966; margin-bottom: 15px; font-size: 20px; }
    .shop-item {
      background: #0a1e2c;
      border-radius: 20px;
      padding: 10px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .shop-item:hover { background: #1a3a5f; transform: scale(1.02); }
    .shop-item.owned { background: #2d6a4f; opacity: 0.8; }
    .shop-item-name { font-weight: bold; font-size: 13px; text-align: left; flex: 2; }
    .shop-item-price { color: #ffd966; font-size: 12px; flex: 1; }
    .shop-item-status { font-size: 10px; color: #a8e6ff; flex: 1; text-align: right; }
    .close-modal {
      background: #ff7b4f;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      color: white;
      margin-top: 15px;
      cursor: pointer;
    }
    .hint {
      text-align: center;
      color: #ffd966;
      font-size: 10px;
      margin-top: 12px;
      background: rgba(0,0,0,0.3);
      padding: 6px;
      border-radius: 30px;
    }
    @media (max-width: 500px) {
      h1 { font-size: 22px; }
      .btn { font-size: 14px; padding: 10px 12px; }
      .coins-display { font-size: 14px; }
      .coins-display span { font-size: 22px; }
      .logo-icon { width: 40px; height: 40px; }
      .logo-text { font-size: 8px; }
    }
  </style>
</head>
<body id="mainBody">
<div class="container">
  <h1>🚇 ИГРЫ В МЕТРО</h1>
  
  <div class="coins-display">
    🪙 Монеток: <span id="globalCoins">0</span>
  </div>
  
  <button class="shop-btn" id="shopBtn">🎨 Магазин фонов</button>
  
  <div class="menu">
    <a href="memory.html" class="btn memory">🧠 Линия памяти</a>
    <a href="maze.html" class="btn maze">🌀 Лабиринт</a>
    <a href="match3.html" class="btn match3">💎 Три в ряд</a>
    <a href="builder.html" class="btn builder">🏗️ Строительство метро</a>
    <a href="museum.html" class="btn museum">🏛️ Музей метро</a>
  </div>
  
  <div class="logos">
    <div class="logo">
      <img src="images/Logo_metro.PNG" alt="Московский метрополитен" class="logo-icon">
      <div class="logo-text">Московский<br>метрополитен</div>
    </div>
    <div class="logo">
      <img src="images/Logo_kmt.PNG" alt="Колледж Московского транспорта" class="logo-icon">
      <div class="logo-text">Колледж<br>Московского транспорта</div>
    </div>
  </div>
  
  <p class="hint">🏆 Собирай персонажей, получай монетки, строй метро и открывай историю!</p>
</div>

<div id="shopModal" class="modal">
  <div class="modal-content">
    <h2>🎨 Магазин фонов</h2>
    <p>Выбери полупрозрачный узор (100 🪙)</p>
    <div id="shopList"></div>
    <button class="close-modal" id="closeShopBtn">Закрыть</button>
  </div>
</div>

<script>
  const BACKGROUNDS = [
    { id: 'default', name: 'Стандартный фон', price: 0, class: 'overlay-default', owned: true },
    { id: 'airport', name: 'Аэропорт ✈️', price: 100, class: 'overlay-airport', owned: false },
    { id: 'mayakovskaya', name: 'Маяковская 🎭', price: 100, class: 'overlay-mayakovskaya', owned: false },
    { id: 'kievskaya', name: 'Киевская 🏛️', price: 100, class: 'overlay-kievskaya', owned: false },
    { id: 'komsomolskaya', name: 'Комсомольская 🚂', price: 100, class: 'overlay-komsomolskaya', owned: false },
    { id: 'revolution', name: 'Площадь Революции 🦁', price: 100, class: 'overlay-revolution', owned: false }
  ];
  
  let ownedBackgrounds = JSON.parse(localStorage.getItem('owned_backgrounds')) || ['default'];
  let currentBackground = localStorage.getItem('current_background') || 'default';
  
  function updateCoins() {
    const coins = localStorage.getItem('memory_coins') || 0;
    document.getElementById('globalCoins').textContent = coins;
  }
  
  function applyBackground() {
    const body = document.getElementById('mainBody');
    body.className = '';
    const bg = BACKGROUNDS.find(b => b.id === currentBackground);
    if (bg) body.classList.add(bg.class);
  }
  
  function saveOwnedBackgrounds() {
    localStorage.setItem('owned_backgrounds', JSON.stringify(ownedBackgrounds));
    localStorage.setItem('current_background', currentBackground);
  }
  
  function buyBackground(bgId, price) {
    let coins = parseInt(localStorage.getItem('memory_coins') || '0');
    if (coins >= price && !ownedBackgrounds.includes(bgId)) {
      coins -= price;
      localStorage.setItem('memory_coins', coins);
      ownedBackgrounds.push(bgId);
      saveOwnedBackgrounds();
      updateCoins();
      renderShop();
      alert(`✅ Фон «${BACKGROUNDS.find(b => b.id === bgId).name}» куплен!`);
    } else if (ownedBackgrounds.includes(bgId)) {
      alert(`❌ У вас уже есть этот фон!`);
    } else {
      alert(`❌ Не хватает монет! Нужно ${price} 🪙`);
    }
  }
  
  function selectBackground(bgId) {
    if (ownedBackgrounds.includes(bgId)) {
      currentBackground = bgId;
      saveOwnedBackgrounds();
      applyBackground();
      renderShop();
      alert(`✅ Фон применён!`);
    } else {
      alert(`❌ Сначала купите этот фон!`);
    }
  }
  
  function renderShop() {
    const container = document.getElementById('shopList');
    if (!container) return;
    container.innerHTML = '';
    
    for (const bg of BACKGROUNDS) {
      const isOwned = ownedBackgrounds.includes(bg.id);
      const isCurrent = currentBackground === bg.id;
      
      const item = document.createElement('div');
      item.className = `shop-item ${isOwned ? 'owned' : ''}`;
      item.innerHTML = `
        <div class="shop-item-name">${bg.name} ${isCurrent ? '✅' : ''}</div>
        <div class="shop-item-price">${bg.price === 0 ? 'Бесплатно' : bg.price + ' 🪙'}</div>
        <div class="shop-item-status">${isOwned ? (isCurrent ? 'Текущий' : 'В наличии') : 'Не куплен'}</div>
      `;
      
      if (!isOwned && bg.price > 0) {
        item.onclick = () => buyBackground(bg.id, bg.price);
      } else if (isOwned && !isCurrent) {
        item.onclick = () => selectBackground(bg.id);
      } else if (isOwned && isCurrent) {
        item.style.cursor = 'default';
        item.style.opacity = '0.7';
      }
      container.appendChild(item);
    }
  }
  
  const modal = document.getElementById('shopModal');
  document.getElementById('shopBtn').onclick = () => { renderShop(); modal.style.display = 'flex'; };
  document.getElementById('closeShopBtn').onclick = () => { modal.style.display = 'none'; };
  window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
  
  updateCoins();
  setInterval(updateCoins, 1000);
  applyBackground();
</script>
</body>
</html>
