<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎 Три в ряд</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 650px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    select, button {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button { background: #ff7b4f; border-color: #ffaa33; }
    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      aspect-ratio: 1 / 1;
      margin: 20px 0;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 20px;
    }
    .cell {
      border-radius: 10px;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      box-shadow: 0 4px 0 rgba(0,0,0,0.5);
      transition: 0.1s;
    }
    .cell:hover { transform: scale(0.95); filter: brightness(1.2); }
    .score-container {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .score-item {
      background: #153449;
      padding: 6px 12px;
      border-radius: 30px;
      text-align: center;
      flex: 1;
    }
    .score-label { font-size: 12px; color: #a8e6ff; }
    .score-value { font-size: 20px; font-weight: bold; color: #ffd966; }
    .stations-collection, .lines-status {
      background: #0e2a3b;
      padding: 15px;
      border-radius: 30px;
      margin-top: 15px;
    }
    .stations-collection h3, .lines-status h3 { color: #a8e6ff; margin-bottom: 10px; font-size: 16px; }
    .stations-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .station-item {
      background: #1b3a4b;
      padding: 6px 10px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      border: 1px solid #5fa3c0;
    }
    .station-item.checked { background: #0e5c6b; text-decoration: line-through; color: #ffffaa; }
    .station-item input { width: 16px; height: 16px; accent-color: #00d8ff; pointer-events: none; }
    .lines-status-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .line-status-item {
      padding: 8px;
      border-radius: 30px;
      background: #1b3a4b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .line-status-item.completed { background: #0e5c6b; color: #ffffaa; }
    .line-color { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    .line-name { flex: 1; font-size: 12px; }
    .line-progress { font-weight: bold; color: #ffd966; font-size: 12px; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    @media (max-width: 500px) { .score-value { font-size: 16px; } .stations-list { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>💎 ТРИ В РЯД</h1>
  <div class="controls">
    <select id="lineSelect"></select>
    <button id="restartBtn">🔄 Заново</button>
  </div>
  <div id="board" class="board"></div>
  <div class="score-container">
    <div class="score-item"><div class="score-label">⭐ Очки</div><div id="lineScore" class="score-value">0</div></div>
    <div class="score-item"><div class="score-label">📊 Прогресс</div><div id="levelProgress" class="score-value">0/5</div></div>
  </div>
  <div class="stations-collection"><h3>📋 Станции текущей линии:</h3><div id="stationsList" class="stations-list"></div></div>
  <div class="lines-status"><h3>📊 Прогресс линий:</h3><div id="linesStatusList" class="lines-status-list"></div></div>
  <a href="index.html" class="back">⬅ На главную</a>
</div>
<script>
// ==================== ТОЛЬКО 1 УРОВЕНЬ (Классическое метро) ====================
const LEVEL = {
    name: 'Классическое метро',
    lines: [
        { id: 'sokolnicheskaya', name: 'Сокольническая', color: '#e74c3c', stations: [
            'Бульвар Рокоссовского', 'Черкизовская', 'Преображенская площадь', 'Сокольники', 'Красносельская',
            'Комсомольская', 'Красные Ворота', 'Чистые пруды', 'Лубянка', 'Охотный Ряд',
            'Библиотека им. Ленина', 'Кропоткинская', 'Парк культуры', 'Фрунзенская', 'Спортивная',
            'Воробьёвы горы', 'Университет', 'Проспект Вернадского', 'Юго-Западная', 'Тропарёво',
            'Румянцево', 'Саларьево', 'Филатов Луг', 'Прокшино', 'Ольховая', 'Коммунарка'
        ]},
        { id: 'zamoskvoretskaya', name: 'Замоскворецкая', color: '#2ecc71', stations: [
            'Ховрино', 'Беломорская', 'Речной вокзал', 'Водный стадион', 'Войковская',
            'Сокол', 'Аэропорт', 'Динамо', 'Белорусская', 'Маяковская',
            'Тверская', 'Театральная', 'Новокузнецкая', 'Павелецкая', 'Автозаводская',
            'Технопарк', 'Коломенская', 'Каширская', 'Кантемировская', 'Царицыно',
            'Орехово', 'Домодедовская', 'Красногвардейская', 'Алма-Атинская'
        ]},
        { id: 'arbatsko_pokrovskaya', name: 'Арбатско-Покровская', color: '#00008B', stations: [
            'Щёлковская', 'Первомайская', 'Измайловская', 'Партизанская', 'Семёновская',
            'Электрозаводская', 'Бауманская', 'Курская', 'Площадь Революции', 'Арбатская',
            'Смоленская', 'Киевская', 'Парк Победы', 'Славянский бульвар', 'Кунцевская',
            'Молодёжная', 'Крылатское', 'Строгино', 'Мякинино', 'Волоколамская',
            'Митино', 'Пятницкое шоссе'
        ]},
        { id: 'filyovskaya', name: 'Филёвская', color: '#87CEEB', stations: [
            'Александровский сад', 'Арбатская', 'Смоленская', 'Киевская', 'Студенческая',
            'Кутузовская', 'Фили', 'Багратионовская', 'Филевский парк', 'Пионерская',
            'Кунцевская', 'Выставочная', 'Международная'
        ]},
        { id: 'koltsevaya', name: 'Кольцевая', color: '#8B4513', stations: [
            'Киевская', 'Краснопресненская', 'Белорусская', 'Новослободская', 'Проспект Мира',
            'Комсомольская', 'Курская', 'Таганская', 'Павелецкая', 'Добрынинская',
            'Октябрьская', 'Парк культуры'
        ]}
    ]
};

// ==================== ИГРОВАЯ ЛОГИКА ====================
const BOARD_WIDTH = 5;
const BOARD_SIZE = BOARD_WIDTH * BOARD_WIDTH;
const POINTS_PER_MATCH = 10;

let board = [];
let selectedCell = null;
let currentLineId = LEVEL.lines[0].id;
let lineScore = 0;
let isProcessing = false;
let collectedStations = JSON.parse(localStorage.getItem('match3_collected')) || {};

const boardDiv = document.getElementById('board');
const lineScoreDiv = document.getElementById('lineScore');
const levelProgressDiv = document.getElementById('levelProgress');
const lineSelect = document.getElementById('lineSelect');
const stationsListDiv = document.getElementById('stationsList');
const linesStatusDiv = document.getElementById('linesStatusList');
const restartBtn = document.getElementById('restartBtn');

function getCurrentLine() { return LEVEL.lines.find(l => l.id === currentLineId); }

function updateLineSelect() {
    lineSelect.innerHTML = '';
    LEVEL.lines.forEach(line => {
        const option = document.createElement('option');
        option.value = line.id;
        option.textContent = `🚇 ${line.name}`;
        lineSelect.appendChild(option);
    });
    lineSelect.value = currentLineId;
}

function updateStationsUI() {
    const line = getCurrentLine();
    if (!line) return;
    stationsListDiv.innerHTML = '';
    line.stations.forEach(station => {
        const isChecked = collectedStations?.[currentLineId]?.[station] || false;
        const item = document.createElement('div');
        item.className = `station-item ${isChecked ? 'checked' : ''}`;
        item.innerHTML = `<input type="checkbox" ${isChecked ? 'checked' : ''} readonly><span>${station}</span>`;
        stationsListDiv.appendChild(item);
    });
}

function updateLinesStatusUI() {
    let completedLines = 0;
    linesStatusDiv.innerHTML = '';
    LEVEL.lines.forEach(line => {
        const collected = collectedStations?.[line.id] || {};
        const collectedCount = line.stations.filter(s => collected[s]).length;
        const isCompleted = collectedCount === line.stations.length;
        if (isCompleted) completedLines++;
        const item = document.createElement('div');
        item.className = `line-status-item ${isCompleted ? 'completed' : ''}`;
        item.innerHTML = `
            <span class="line-color" style="background-color: ${line.color};"></span>
            <span class="line-name">${line.name}</span>
            <span class="line-progress">${collectedCount}/${line.stations.length}</span>
        `;
        linesStatusDiv.appendChild(item);
    });
    levelProgressDiv.textContent = `${completedLines}/${LEVEL.lines.length}`;
    if (completedLines === LEVEL.lines.length) {
        setTimeout(() => alert(`🎉 ПОЗДРАВЛЯЕМ! Все линии собраны!`), 300);
    }
}

function markStation(color) {
    const line = LEVEL.lines.find(l => l.color === color);
    if (!line) return;
    const available = line.stations.filter(s => !collectedStations?.[line.id]?.[s]);
    if (available.length === 0) return;
    const randomStation = available[Math.floor(Math.random() * available.length)];
    if (!collectedStations[line.id]) collectedStations[line.id] = {};
    collectedStations[line.id][randomStation] = true;
    if (line.id === currentLineId) updateStationsUI();
    updateLinesStatusUI();
    localStorage.setItem('match3_collected', JSON.stringify(collectedStations));
}

function initCollected() {
    if (!collectedStations) collectedStations = {};
    LEVEL.lines.forEach(line => {
        if (!collectedStations[line.id]) {
            collectedStations[line.id] = {};
            line.stations.forEach(s => { collectedStations[line.id][s] = false; });
        }
    });
}

function getColors() { return LEVEL.lines.map(l => l.color); }

function findMatches() {
    const matches = new Set();
    for (let row = 0; row < BOARD_WIDTH; row++) {
        for (let col = 0; col < BOARD_WIDTH - 2; col++) {
            const i1 = row * BOARD_WIDTH + col, i2 = i1 + 1, i3 = i1 + 2;
            if (board[i1].color && board[i1].color === board[i2].color && board[i1].color === board[i3].color) {
                matches.add(i1); matches.add(i2); matches.add(i3);
            }
        }
    }
    for (let col = 0; col < BOARD_WIDTH; col++) {
        for (let row = 0; row < BOARD_WIDTH - 2; row++) {
            const i1 = row * BOARD_WIDTH + col, i2 = i1 + BOARD_WIDTH, i3 = i2 + BOARD_WIDTH;
            if (board[i1].color && board[i1].color === board[i2].color && board[i1].color === board[i3].color) {
                matches.add(i1); matches.add(i2); matches.add(i3);
            }
        }
    }
    return Array.from(matches);
}

function dropCells() {
    const colors = getColors();
    for (let col = 0; col < BOARD_WIDTH; col++) {
        const colColors = [];
        for (let row = BOARD_WIDTH - 1; row >= 0; row--) {
            const idx = row * BOARD_WIDTH + col;
            if (board[idx].color) colColors.push(board[idx].color);
        }
        const need = BOARD_WIDTH - colColors.length;
        for (let i = 0; i < need; i++) colColors.push(colors[Math.floor(Math.random() * colors.length)]);
        for (let row = BOARD_WIDTH - 1; row >= 0; row--) {
            const idx = row * BOARD_WIDTH + col;
            board[idx].color = colColors[BOARD_WIDTH - 1 - row];
            board[idx].element.style.backgroundColor = board[idx].color;
        }
    }
}

function removeMatches() {
    const matches = findMatches();
    if (matches.length === 0) return false;
    const colorSet = new Set(matches.map(i => board[i].color));
    colorSet.forEach(c => { if (c) markStation(c); });
    lineScore += matches.length * POINTS_PER_MATCH;
    lineScoreDiv.textContent = lineScore;
    matches.forEach(i => { board[i].color = ''; board[i].element.style.backgroundColor = ''; });
    dropCells();
    return true;
}

function trySwap(idx1, idx2) {
    if (isProcessing) return false;
    const temp = board[idx1].color;
    board[idx1].color = board[idx2].color;
    board[idx2].color = temp;
    board[idx1].element.style.backgroundColor = board[idx1].color;
    board[idx2].element.style.backgroundColor = board[idx2].color;
    if (findMatches().length > 0) {
        isProcessing = true;
        while (removeMatches()) {}
        isProcessing = false;
        return true;
    } else {
        const back = board[idx1].color;
        board[idx1].color = board[idx2].color;
        board[idx2].color = back;
        board[idx1].element.style.backgroundColor = board[idx1].color;
        board[idx2].element.style.backgroundColor = board[idx2].color;
        return false;
    }
}

function handleCellClick(idx) {
    if (isProcessing) return;
    if (selectedCell === null) {
        selectedCell = idx;
        board[idx].element.style.border = '3px solid white';
    } else {
        board[selectedCell].element.style.border = '';
        if (selectedCell !== idx) trySwap(selectedCell, idx);
        selectedCell = null;
    }
}

function initBoard() {
    boardDiv.innerHTML = '';
    board = [];
    const colors = getColors();
    for (let i = 0; i < BOARD_SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const color = colors[Math.floor(Math.random() * colors.length)];
        cell.style.backgroundColor = color;
        cell.onclick = (function(idx) { return () => handleCellClick(idx); })(i);
        boardDiv.appendChild(cell);
        board.push({ element: cell, color: color });
    }
    selectedCell = null;
    isProcessing = false;
    lineScore = 0;
    lineScoreDiv.textContent = '0';
    setTimeout(() => { while (removeMatches()) {} }, 10);
}

function resetGame() {
    initCollected();
    updateStationsUI();
    updateLinesStatusUI();
    initBoard();
}

lineSelect.addEventListener('change', () => {
    currentLineId = lineSelect.value;
    updateStationsUI();
});
restartBtn.addEventListener('click', resetGame);

updateLineSelect();
initCollected();
updateStationsUI();
updateLinesStatusUI();
initBoard();
</script>
</body>
</html>
