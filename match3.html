<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💎 Три в ряд</title>
    <link rel="stylesheet" href="match3.css" />
</head>
<body>
    <div class="game-container">
        <h1>💎 ТРИ В РЯД</h1>

        <!-- Выбор уровня -->
        <div class="level-selector">
            <label for="level-select">🌟 Уровень:</label>
            <select id="level-select">
                <option value="level1">Уровень 1: Классическое метро</option>
                <option value="level2">Уровень 2: Радиальные линии</option>
                <option value="level3">Уровень 3: Новые линии</option>
                <option value="level4">Уровень 4: МЦД</option>
            </select>
        </div>

        <!-- Выбор линии -->
        <div class="line-selector">
            <label for="line-select">🚇 Линия:</label>
            <select id="line-select"></select>
        </div>

        <!-- Игровое поле 5x5 -->
        <div id="game-board" class="board"></div>

        <!-- Счёт и прогресс -->
        <div class="score-container">
            <div class="score-item">
                <span class="score-label">⭐ Очки:</span>
                <span id="line-score" class="score-value">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">🏆 Всего:</span>
                <span id="total-score" class="score-value">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">📊 Прогресс:</span>
                <span id="level-progress" class="score-value">0/5</span>
            </div>
            <button id="restart" class="restart-btn">🔄 Заново</button>
        </div>

        <!-- Список станций -->
        <div class="stations-collection">
            <h3>📋 Станции:</h3>
            <div id="stations-list" class="stations-list"></div>
        </div>

        <!-- Статус линий -->
        <div class="lines-status">
            <h3>📊 Прогресс линий:</h3>
            <div id="lines-status-list" class="lines-status-list"></div>
        </div>

        <!-- Кнопка назад -->
        <a href="index.html" class="back-btn">⬅ На главную</a>
    </div>

    <script src="match3.js"></script>
</body>
</html>
