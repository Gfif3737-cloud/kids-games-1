<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎 Три в ряд</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 650px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    select, button {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button { background: #ff7b4f; border-color: #ffaa33; }
    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      aspect-ratio: 1 / 1;
      margin: 20px 0;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 20px;
    }
    .cell {
      border-radius: 10px;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      box-shadow: 0 4px 0 rgba(0,0,0,0.5);
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
    }
    .cell:hover { transform: scale(0.95); filter: brightness(1.2); }
    .score-container {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 15px 0;
    }
    .score-item { background: #153449; padding: 6px 20px; border-radius: 30px; text-align: center; }
    .score-label { font-size: 12px; color: #a8e6ff; }
    .score-value { font-size: 20px; font-weight: bold; color: #ffd966; }
    .stations-collection, .lines-status {
      background: #0e2a3b;
      padding: 15px;
      border-radius: 30px;
      margin-top: 15px;
    }
    .stations-collection h3, .lines-status h3 { color: #a8e6ff; margin-bottom: 10px; font-size: 16px; }
    .stations-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .station-item {
      background: #1b3a4b;
      padding: 6px 10px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      border: 1px solid #5fa3c0;
    }
    .station-item.checked { background: #0e5c6b; text-decoration: line-through; color: #ffffaa; }
    .station-item input { width: 16px; height: 16px; accent-color: #00d8ff; pointer-events: none; }
    .lines-status-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .line-status-item {
      padding: 8px;
      border-radius: 30px;
      background: #1b3a4b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .line-status-item.completed { background: #0e5c6b; color: #ffffaa; }
    .line-color { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    .line-name { flex: 1; font-size: 12px; }
    .line-progress { font-weight: bold; color: #ffd966; font-size: 12px; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    @media (max-width: 500px) { .score-value { font-size: 16px; } .stations-list { grid-template-columns: repeat(2, 1fr); } .cell { font-size: 16px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>💎 ТРИ В РЯД</h1>
  <div class="controls">
    <select id="levelSelect">
      <option value="level1">Уровень 1: Классическое метро</option>
      <option value="level2">Уровень 2: Радиальные линии</option>
      <option value="level3">Уровень 3: Новые линии</option>
      <option value="level4">Уровень 4: МЦД</option>
    </select>
    <select id="lineSelect"></select>
    <button id="restartBtn">🔄 Заново</button>
  </div>
  <div id="board" class="board"></div>
  <div class="score-container">
    <div class="score-item"><div class="score-label">⭐ Очки</div><div id="lineScore" class="score-value">0</div></div>
    <div class="score-item"><div class="score-label">📊 Прогресс</div><div id="levelProgress" class="score-value">0/5</div></div>
  </div>
  <div class="stations-collection"><h3>📋 Станции текущей линии:</h3><div id="stationsList" class="stations-list"></div></div>
  <div class="lines-status"><h3>📊 Прогресс линий:</h3><div id="linesStatusList" class="lines-status-list"></div></div>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
// ==================== УРОВНИ ====================
const LEVELS = {
  level1: { name: 'Классическое метро', lines: [
    { id: 'sokolnicheskaya', name: 'Сокольническая', number: '1', color: '#e74c3c', stations: ['Бульвар Рокоссовского', 'Черкизовская', 'Преображенская площадь', 'Сокольники', 'Красносельская'] },
    { id: 'zamoskvoretskaya', name: 'Замоскворецкая', number: '2', color: '#2ecc71', stations: ['Ховрино', 'Беломорская', 'Речной вокзал', 'Водный стадион', 'Войковская'] },
    { id: 'arbatsko_pokrovskaya', name: 'Арбатско-Покровская', number: '3', color: '#00008B', stations: ['Щёлковская', 'Первомайская', 'Измайловская', 'Партизанская', 'Семёновская'] },
    { id: 'filyovskaya', name: 'Филёвская', number: '4', color: '#87CEEB', stations: ['Александровский сад', 'Арбатская', 'Смоленская', 'Киевская', 'Студенческая'] },
    { id: 'koltsevaya', name: 'Кольцевая', number: '5', color: '#8B4513', stations: ['Киевская', 'Краснопресненская', 'Белорусская', 'Новослободская', 'Проспект Мира'] }
  ]},
  level2: { name: 'Радиальные линии', lines: [
    { id: 'kaluzhsko_rizhskaya', name: 'Калужско-Рижская', number: '6', color: '#FF8C00', stations: ['Медведково', 'Бабушкинская', 'Свиблово', 'Ботанический сад', 'ВДНХ'] },
    { id: 'tagansko_krasnopresnenskaya', name: 'Таганско-Краснопресненская', number: '7', color: '#8B00FF', stations: ['Планерная', 'Сходненская', 'Тушинская', 'Спартак', 'Щукинская'] },
    { id: 'kalinskaya', name: 'Калининская', number: '8', color: '#FFD700', stations: ['Новогиреево', 'Перово', 'Шоссе Энтузиастов', 'Авиамоторная', 'Площадь Ильича'] },
    { id: 'solntsevskaya', name: 'Солнцевская', number: '9', color: '#DC143C', stations: ['Деловой центр', 'Парк Победы', 'Минская', 'Ломоносовский проспект', 'Раменки'] },
    { id: 'serpukhovsko_timiryazevskaya', name: 'Серпуховско-Тимирязевская', number: '10', color: '#708090', stations: ['Алтуфьево', 'Бибирево', 'Отрадное', 'Владыкино', 'Петровско-Разумовская'] }
  ]},
  level3: { name: 'Новые линии', lines: [
    { id: 'lublinsko_dmitrovskaya', name: 'Люблинско-Дмитровская', number: '11', color: '#32CD32', stations: ['Физтех', 'Лианозово', 'Яхромская', 'Селигерская', 'Верхние Лихоборы'] },
    { id: 'bolshaya_koltsevaya', name: 'Большая кольцевая', number: '12', color: '#DC143C', stations: ['Деловой центр', 'Шелепиха', 'Хорошёвская', 'ЦСКА', 'Петровский парк'] },
    { id: 'butovskaya', name: 'Бутовская', number: '13', color: '#ADD8E6', stations: ['Битцевский парк', 'Лесопарковая', 'Улица Старокачаловская', 'Улица Скобелевская', 'Бульвар Адмирала Ушакова'] },
    { id: 'troitskaya', name: 'Троицкая', number: '14', color: '#DDA0DD', stations: ['ЗИЛ', 'Крымская', 'Академическая', 'Вавиловская', 'Новаторская'] },
    { id: 'mck', name: 'МЦК', number: '15', color: '#CD5C5C', stations: ['Окружная', 'Лихоборы', 'Коптево', 'Балтийская', 'Стрешнево'] }
  ]},
  level4: { name: 'МЦД', lines: [
    { id: 'mcd1', name: 'МЦД-1', number: '1', color: '#FFA500', stations: ['Одинцово', 'Баковка', 'Сколково', 'Немчиновка', 'Сетунь'] },
    { id: 'mcd2', name: 'МЦД-2', number: '2', color: '#FF69B4', stations: ['Нахабино', 'Аникеевка', 'Опалиха', 'Красногорская', 'Павшино'] },
    { id: 'mcd3', name: 'МЦД-3', number: '3', color: '#1E90FF', stations: ['Крюково', 'Малино', 'Фирсановка', 'Сходня', 'Подрезково'] },
    { id: 'mcd4', name: 'МЦД-4', number: '4', color: '#228B22', stations: ['Апрелевка', 'Реутово', 'Победа', 'Крёкшино', 'Санино'] }
  ]}
};

const LEVEL_REWARDS = {
  level1: 'Вагон типа А (1935)',
  level2: 'Вагон типа Б (1937)',
  level3: 'Вагон типа Г (1940)',
  level4: 'Вагон типа Д (1955)'
};

function giveCoin() {
  let coins = JSON.parse(localStorage.getItem('memory_coins')) || 0;
  coins++;
  localStorage.setItem('memory_coins', JSON.stringify(coins));
  setTimeout(() => alert(`🪙 МОНЕТКА!\n\n+1 монетка (всего: ${coins})`), 300);
}

function giveReward(levelId) {
  const reward = LEVEL_REWARDS[levelId];
  if (!reward) return;
  let artifacts = JSON.parse(localStorage.getItem('metro_artifacts')) || {};
  if (!artifacts.wagons) artifacts.wagons = [false, false, false, false];
  const levelIndex = { level1: 0, level2: 1, level3: 2, level4: 3 }[levelId];
  if (!artifacts.wagons[levelIndex]) {
    artifacts.wagons[levelIndex] = true;
    localStorage.setItem('metro_artifacts', JSON.stringify(artifacts));
    setTimeout(() => alert(`🏛️ ПОЛУЧЕН АРТЕФАКТ!\n\n${reward}\n\nЗагляни в Музей метро!`), 300);
  }
}

// ==================== ИГРОВАЯ ЛОГИКА ====================
const BOARD_WIDTH = 5;
const BOARD_SIZE = BOARD_WIDTH * BOARD_WIDTH;
let board = [];
let selectedCell = null;
let currentLevelId = 'level1';
let currentLineId = '';
let lineScore = 0;
let isProcessing = false;
let collectedStations = JSON.parse(localStorage.getItem('match3_collected')) || {};
let userProgress = JSON.parse(localStorage.getItem('match3_progress')) || {
  level1: { unlocked: true, completed: false },
  level2: { unlocked: false, completed: false },
  level3: { unlocked: false, completed: false },
  level4: { unlocked: false, completed: false }
};
let lastScoreMilestone = 0;

const boardDiv = document.getElementById('board');
const lineScoreDiv = document.getElementById('lineScore');
const levelProgressDiv = document.getElementById('levelProgress');
const levelSelect = document.getElementById('levelSelect');
const lineSelect = document.getElementById('lineSelect');
const stationsListDiv = document.getElementById('stationsList');
const linesStatusDiv = document.getElementById('linesStatusList');
const restartBtn = document.getElementById('restartBtn');

function getCurrentLevel() { return LEVELS[currentLevelId]; }
function getCurrentLine() { return getCurrentLevel().lines.find(l => l.id === currentLineId); }

function updateLevelSelectUI() {
  Array.from(levelSelect.options).forEach(opt => {
    if (userProgress[opt.value]?.unlocked) {
      opt.disabled = false;
      opt.textContent = LEVELS[opt.value].name + (userProgress[opt.value]?.completed ? ' ✓' : '');
    } else {
      opt.disabled = true;
      opt.textContent = '🔒 ' + LEVELS[opt.value].name;
    }
  });
}

function updateLineSelect() {
  lineSelect.innerHTML = '';
  getCurrentLevel().lines.forEach(line => {
    const option = document.createElement('option');
    option.value = line.id;
    option.textContent = `🚇 ${line.name}`;
    lineSelect.appendChild(option);
  });
  currentLineId = getCurrentLevel().lines[0].id;
  lineSelect.value = currentLineId;
}

function updateStationsUI() {
  const line = getCurrentLine();
  if (!line) return;
  stationsListDiv.innerHTML = '';
  line.stations.forEach(station => {
    const isChecked = collectedStations?.[currentLevelId]?.[currentLineId]?.[station] || false;
    const item = document.createElement('div');
    item.className = `station-item ${isChecked ? 'checked' : ''}`;
    item.innerHTML = `<input type="checkbox" ${isChecked ? 'checked' : ''} readonly><span>${station}</span>`;
    stationsListDiv.appendChild(item);
  });
}

function updateLinesStatusUI() {
  let completedLines = 0;
  linesStatusDiv.innerHTML = '';
  const level = getCurrentLevel();
  level.lines.forEach(line => {
    const collected = collectedStations?.[currentLevelId]?.[line.id] || {};
    const collectedCount = line.stations.filter(s => collected[s]).length;
    const isCompleted = collectedCount === line.stations.length;
    if (isCompleted) completedLines++;
    const item = document.createElement('div');
    item.className = `line-status-item ${isCompleted ? 'completed' : ''}`;
    item.innerHTML = `
      <span class="line-color" style="background-color: ${line.color};"></span>
      <span class="line-name">${line.name}</span>
      <span class="line-progress">${collectedCount}/${line.stations.length}</span>
    `;
    linesStatusDiv.appendChild(item);
  });
  levelProgressDiv.textContent = `${completedLines}/${level.lines.length}`;
  if (completedLines === level.lines.length && !userProgress[currentLevelId]?.completed) {
    userProgress[currentLevelId].completed = true;
    const levelOrder = ['level1', 'level2', 'level3', 'level4'];
    const idx = levelOrder.indexOf(currentLevelId);
    if (idx < levelOrder.length - 1) userProgress[levelOrder[idx + 1]].unlocked = true;
    localStorage.setItem('match3_progress', JSON.stringify(userProgress));
    updateLevelSelectUI();
    giveReward(currentLevelId);
    setTimeout(() => alert(`🎉 УРОВЕНЬ ПРОЙДЕН! Открыт следующий уровень!`), 300);
  }
}

function markStation(color) {
  if (userProgress[currentLevelId]?.completed) return;
  const line = getCurrentLevel().lines.find(l => l.color === color);
  if (!line) return;
  const available = line.stations.filter(s => !collectedStations?.[currentLevelId]?.[line.id]?.[s]);
  if (available.length === 0) return;
  const randomStation = available[Math.floor(Math.random() * available.length)];
  if (!collectedStations[currentLevelId]) collectedStations[currentLevelId] = {};
  if (!collectedStations[currentLevelId][line.id]) collectedStations[currentLevelId][line.id] = {};
  collectedStations[currentLevelId][line.id][randomStation] = true;
  if (line.id === currentLineId) updateStationsUI();
  updateLinesStatusUI();
  localStorage.setItem('match3_collected', JSON.stringify(collectedStations));
}

function initCollected() {
  if (!collectedStations[currentLevelId]) {
    collectedStations[currentLevelId] = {};
    getCurrentLevel().lines.forEach(line => {
      collectedStations[currentLevelId][line.id] = {};
      line.stations.forEach(s => { collectedStations[currentLevelId][line.id][s] = false; });
    });
  }
}

function getColors() { return getCurrentLevel().lines.map(l => l.color); }

function calculateMatchScore(matchLength) {
  if (matchLength === 3) return 10;
  if (matchLength === 4) return 15;
  if (matchLength >= 5) return 30;
  return 0;
}

function findMatches() {
  const matches = new Set();
  const matchGroups = [];
  for (let row = 0; row < BOARD_WIDTH; row++) {
    for (let col = 0; col < BOARD_WIDTH - 2; col++) {
      const i1 = row * BOARD_WIDTH + col, i2 = i1 + 1, i3 = i1 + 2;
      if (board[i1].color && board[i1].color === board[i2].color && board[i1].color === board[i3].color) {
        let len = 3;
        while (col + len < BOARD_WIDTH && board[i1 + len]?.color === board[i1].color) len++;
        for (let k = 0; k < len; k++) matches.add(i1 + k);
        matchGroups.push({ indices: Array.from({length: len}, (_,k) => i1 + k), length: len });
        col += len - 1;
      }
    }
  }
  for (let col = 0; col < BOARD_WIDTH; col++) {
    for (let row = 0; row < BOARD_WIDTH - 2; row++) {
      const i1 = row * BOARD_WIDTH + col, i2 = i1 + BOARD_WIDTH, i3 = i2 + BOARD_WIDTH;
      if (board[i1].color && board[i1].color === board[i2].color && board[i1].color === board[i3].color) {
        let len = 3;
        while (row + len < BOARD_WIDTH && board[i1 + len * BOARD_WIDTH]?.color === board[i1].color) len++;
        for (let k = 0; k < len; k++) matches.add(i1 + k * BOARD_WIDTH);
        matchGroups.push({ indices: Array.from({length: len}, (_,k) => i1 + k * BOARD_WIDTH), length: len });
        row += len - 1;
      }
    }
  }
  return { matches: Array.from(matches), groups: matchGroups };
}

function dropCells() {
  const lines = getCurrentLevel().lines;
  for (let col = 0; col < BOARD_WIDTH; col++) {
    const colColors = [], colNumbers = [], colLineIds = [];
    for (let row = BOARD_WIDTH - 1; row >= 0; row--) {
      const idx = row * BOARD_WIDTH + col;
      if (board[idx].color) {
        colColors.push(board[idx].color);
        colNumbers.push(board[idx].number);
        colLineIds.push(board[idx].lineId);
      }
    }
    const need = BOARD_WIDTH - colColors.length;
    for (let i = 0; i < need; i++) {
      const randomLine = lines[Math.floor(Math.random() * lines.length)];
      colColors.push(randomLine.color);
      colNumbers.push(randomLine.number);
      colLineIds.push(randomLine.id);
    }
    for (let row = BOARD_WIDTH - 1; row >= 0; row--) {
      const idx = row * BOARD_WIDTH + col;
      board[idx].color = colColors[BOARD_WIDTH - 1 - row];
      board[idx].number = colNumbers[BOARD_WIDTH - 1 - row];
      board[idx].lineId = colLineIds[BOARD_WIDTH - 1 - row];
      board[idx].element.style.backgroundColor = board[idx].color;
      board[idx].element.textContent = board[idx].number;
    }
  }
}

function removeMatches() {
  const { matches, groups } = findMatches();
  if (matches.length === 0) return false;
  
  let totalPoints = 0;
  groups.forEach(group => {
    const score = calculateMatchScore(group.length);
    totalPoints += score;
  });
  
  lineScore += totalPoints;
  lineScoreDiv.textContent = lineScore;
  
  // Монетки за каждые 100 очков
  const newMilestone = Math.floor(lineScore / 100);
  if (newMilestone > lastScoreMilestone) {
    const coinsEarned = newMilestone - lastScoreMilestone;
    for (let i = 0; i < coinsEarned; i++) giveCoin();
    lastScoreMilestone = newMilestone;
  }
  
  const uniqueColors = new Set(matches.map(i => board[i].color));
  uniqueColors.forEach(c => { if (c && !userProgress[currentLevelId]?.completed) markStation(c); });
  
  matches.forEach(i => { 
    board[i].color = ''; 
    board[i].element.style.backgroundColor = '';
    board[i].element.textContent = '';
  });
  dropCells();
  return true;
}

function trySwap(idx1, idx2) {
  if (isProcessing) return false;
  const tempColor = board[idx1].color, tempNumber = board[idx1].number, tempLineId = board[idx1].lineId;
  board[idx1].color = board[idx2].color; board[idx1].number = board[idx2].number; board[idx1].lineId = board[idx2].lineId;
  board[idx2].color = tempColor; board[idx2].number = tempNumber; board[idx2].lineId = tempLineId;
  board[idx1].element.style.backgroundColor = board[idx1].color; board[idx1].element.textContent = board[idx1].number;
  board[idx2].element.style.backgroundColor = board[idx2].color; board[idx2].element.textContent = board[idx2].number;
  if (findMatches().matches.length > 0) {
    isProcessing = true;
    while (removeMatches()) {}
    isProcessing = false;
    return true;
  } else {
    const backColor = board[idx1].color, backNumber = board[idx1].number, backLineId = board[idx1].lineId;
    board[idx1].color = board[idx2].color; board[idx1].number = board[idx2].number; board[idx1].lineId = board[idx2].lineId;
    board[idx2].color = backColor; board[idx2].number = backNumber; board[idx2].lineId = backLineId;
    board[idx1].element.style.backgroundColor = board[idx1].color; board[idx1].element.textContent = board[idx1].number;
    board[idx2].element.style.backgroundColor = board[idx2].color; board[idx2].element.textContent = board[idx2].number;
    return false;
  }
}

function handleCellClick(idx) {
  if (isProcessing) return;
  if (selectedCell === null) {
    selectedCell = idx;
    board[idx].element.style.border = '3px solid white';
  } else {
    board[selectedCell].element.style.border = '';
    if (selectedCell !== idx) trySwap(selectedCell, idx);
    selectedCell = null;
  }
}

function initBoard() {
  boardDiv.innerHTML = '';
  board = [];
  const lines = getCurrentLevel().lines;
  for (let i = 0; i < BOARD_SIZE; i++) {
    const randomLine = lines[Math.floor(Math.random() * lines.length)];
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.backgroundColor = randomLine.color;
    cell.textContent = randomLine.number;
    cell.onclick = (function(idx) { return () => handleCellClick(idx); })(i);
    boardDiv.appendChild(cell);
    board.push({ element: cell, color: randomLine.color, lineId: randomLine.id, number: randomLine.number });
  }
  selectedCell = null;
  isProcessing = false;
  lineScore = 0;
  lastScoreMilestone = 0;
  lineScoreDiv.textContent = '0';
  setTimeout(() => { while (removeMatches()) {} }, 10);
}

function resetGame() {
  initCollected();
  updateStationsUI();
  updateLinesStatusUI();
  initBoard();
}

levelSelect.addEventListener('change', () => {
  currentLevelId = levelSelect.value;
  updateLineSelect();
  initCollected();
  updateStationsUI();
  updateLinesStatusUI();
  initBoard();
  lineScore = 0;
  lastScoreMilestone = 0;
  lineScoreDiv.textContent = '0';
});
lineSelect.addEventListener('change', () => {
  currentLineId = lineSelect.value;
  updateStationsUI();
});
restartBtn.addEventListener('click', resetGame);

updateLevelSelectUI();
updateLineSelect();
initCollected();
updateStationsUI();
updateLinesStatusUI();
initBoard();
</script>
</body>
</html>
