<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌀 Линия лабиринта</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .character-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .char-btn {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 15px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      min-width: 100px;
    }
    .char-btn.active { background: #ff7b4f; border-color: #ffaa33; }
    .char-progress { font-size: 12px; margin-top: 5px; color: #a8e6ff; }
    .stats {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #ffd966;
      margin: 15px 0;
    }
    .game-wrapper {
      overflow-x: auto;
      text-align: center;
      margin: 10px 0;
    }
    #game { 
      display: inline-grid; 
      gap: 2px; 
      margin: 0 auto;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 20px;
    }
    .cell { 
      width: 32px; 
      height: 32px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 18px; 
      border-radius: 5px; 
    }
    .path { background-color: #d4c5a0; color: #5a4a2a; }
    .wall { background-color: #1a2a3a; color: #4a6a8a; }
    .player { background-color: #ffaa44; border-radius: 50%; color: #000; }
    .goal { background-color: #ffdd44; border-radius: 50%; color: #000; }
    .next-btn { background: #4caf50; padding: 10px 20px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; margin: 10px auto; display: block; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    .hint { text-align: center; font-size: 12px; margin: 10px 0; color: #a8e6ff; }
    @media (max-width: 550px) { .cell { width: 28px; height: 28px; font-size: 14px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🌀 Линия лабиринта</h1>
  
  <div class="character-selector" id="characterSelector"></div>
  
  <div class="stats">
    <span>🎮 <span id="currentCharName">—</span> <span id="currentLevel">1</span>/25</span>
    <span>🏆 Всего: <span id="totalLevels">0</span>/100</span>
    <span>🪙 <span id="coinsDisplay">0</span></span>
  </div>
  
  <div class="game-wrapper">
    <div id="game"></div>
  </div>
  
  <button id="nextLevelBtn" class="next-btn" style="display: none;">➡️ Следующий уровень</button>
  <p class="hint">⬆️⬇️⬅️➡️ или свайп</p>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
// ==================== ПЕРСОНАЖИ ====================
const CHARACTERS = {
  cheburashka: { name: 'Чебурашка', player: '🐵', goal: '🍊', icon: '🐵' },
  pin: { name: 'Пин', player: '🐧', goal: '🚗', icon: '🐧' },
  matroskin: { name: 'Матроскин', player: '🐱', goal: '🐄', icon: '🐱' },
  masha: { name: 'Маша', player: '👧', goal: '🐻', icon: '👧' }
};

// ==================== ПРОГРЕСС ====================
let currentCharId = 'cheburashka';
let maze = [];
let player = { x: 0, y: 0 };
let goal = { x: 0, y: 0 };
const SIZE = 10;
let steps = 0;
let gameActive = true;
let currentLevel = 1;

// Прогресс персонажей (сколько уровней ПРОЙДЕНО, максимум 25)
let characterProgress = JSON.parse(localStorage.getItem('maze_character_progress')) || {
  cheburashka: { levelsCompleted: 0, totalSteps: 0 },
  pin: { levelsCompleted: 0, totalSteps: 0 },
  matroskin: { levelsCompleted: 0, totalSteps: 0 },
  masha: { levelsCompleted: 0, totalSteps: 0 }
};

let coins = parseInt(localStorage.getItem('memory_coins') || '0');

function saveProgress() {
  localStorage.setItem('maze_character_progress', JSON.stringify(characterProgress));
  localStorage.setItem('memory_coins', coins);
}

function updateUI() {
  document.getElementById('coinsDisplay').textContent = coins;
  document.getElementById('currentCharName').textContent = CHARACTERS[currentCharId].name;
  document.getElementById('currentLevel').textContent = currentLevel;
  
  let totalLevels = 0;
  for (let char in characterProgress) {
    totalLevels += characterProgress[char].levelsCompleted;
  }
  document.getElementById('totalLevels').textContent = totalLevels;
  
  document.querySelectorAll('.char-btn').forEach(btn => {
    const charId = btn.dataset.char;
    const progress = characterProgress[charId].levelsCompleted;
    btn.classList.toggle('active', charId === currentCharId);
    btn.querySelector('.char-progress').textContent = `${progress}/25`;
  });
}

function giveCoin() {
  coins++;
  saveProgress();
  updateUI();
  // Показываем всплывающее уведомление на карте
  showFloatingCoin();
}

function showFloatingCoin() {
  const gameDiv = document.getElementById('game');
  if (!gameDiv) return;
  const rect = gameDiv.getBoundingClientRect();
  const div = document.createElement('div');
  div.className = 'floating-income';
  div.textContent = `🪙 +1 монета`;
  div.style.position = 'fixed';
  div.style.left = (rect.left + rect.width / 2) + 'px';
  div.style.top = (rect.top + rect.height / 2) + 'px';
  div.style.background = '#ffd966';
  div.style.color = '#000';
  div.style.padding = '4px 12px';
  div.style.borderRadius = '20px';
  div.style.fontSize = '14px';
  div.style.fontWeight = 'bold';
  div.style.pointerEvents = 'none';
  div.style.zIndex = '100';
  div.style.animation = 'floatUp 1s ease-out forwards';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
}

// Добавляем анимацию в CSS
const style = document.createElement('style');
style.textContent = `
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }
`;
document.head.appendChild(style);

// ==================== ГЕНЕРАЦИЯ ЛАБИРИНТА ====================
function generateMaze() {
  maze = Array(SIZE).fill().map(() => Array(SIZE).fill(1));
  
  function carve(x, y) {
    const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
    for (let i = dirs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
    }
    maze[y][x] = 0;
    for (const [dx, dy] of dirs) {
      const nx = x + dx;
      const ny = y + dy;
      if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE && maze[ny][nx] === 1) {
        maze[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  
  carve(0, 0);
  goal = { x: SIZE - 1, y: SIZE - 1 };
  maze[goal.y][goal.x] = 0;
  player = { x: 0, y: 0 };
  steps = 0;
  gameActive = true;
  document.getElementById('nextLevelBtn').style.display = 'none';
}

function draw() {
  const gameDiv = document.getElementById('game');
  gameDiv.innerHTML = "";
  const cellSize = Math.min(32, Math.floor(window.innerWidth / SIZE) - 2);
  gameDiv.style.gridTemplateColumns = `repeat(${SIZE}, ${cellSize}px)`;
  
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      
      if (x === player.x && y === player.y) {
        cell.classList.add("player");
        cell.textContent = CHARACTERS[currentCharId].player;
      } else if (x === goal.x && y === goal.y) {
        cell.classList.add("goal");
        cell.textContent = CHARACTERS[currentCharId].goal;
      } else if (maze[y][x] === 1) {
        cell.classList.add("wall");
        cell.textContent = "█";
      } else {
        cell.classList.add("path");
        cell.textContent = "·";
      }
      gameDiv.appendChild(cell);
    }
  }
}

function move(dx, dy) {
  if (!gameActive) return;
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE && maze[ny][nx] === 0) {
    player.x = nx;
    player.y = ny;
    steps++;
    draw();
    
    if (player.x === goal.x && player.y === goal.y) {
      gameActive = false;
      
      // Проверяем, не достиг ли персонаж уже 25 уровней
      const currentCompleted = characterProgress[currentCharId].levelsCompleted;
      
      if (currentCompleted >= 25) {
        // Персонаж уже прошёл 25 уровней → больше не засчитываем, но монету даём
        giveCoin();
        setTimeout(() => alert(`🎉 Уровень ${currentLevel} пройден!\n+1 монета`), 100);
        // Не увеличиваем прогресс, так как уже 25
      } else {
        // Обычное прохождение уровня
        const newCompleted = currentCompleted + 1;
        characterProgress[currentCharId].levelsCompleted = newCompleted;
        characterProgress[currentCharId].totalSteps += steps;
        
        // Награда: каждый 2-й уровень до 25 даёт монету
        if (newCompleted % 2 === 0) {
          giveCoin();
          setTimeout(() => alert(`🎉 Уровень ${currentLevel} пройден!\n+1 монета`), 100);
        } else {
          setTimeout(() => alert(`🎉 Уровень ${currentLevel} пройден!`), 100);
        }
      }
      
      saveProgress();
      updateUI();
      
      // Если персонаж достиг 25 уровня и это его последний уровень
      if (characterProgress[currentCharId].levelsCompleted >= 25 && currentLevel >= 25) {
        setTimeout(() => {
          alert(`🏆 ПОЗДРАВЛЯЮ!\n\n${CHARACTERS[currentCharId].name} прошёл все 25 уровней!`);
        }, 500);
        document.getElementById('nextLevelBtn').style.display = 'none';
        return;
      }
      
      // Следующий уровень (не больше 25)
      if (currentLevel < 25) {
        currentLevel++;
        generateMaze();
        draw();
        updateUI();
        document.getElementById('nextLevelBtn').style.display = 'none';
      } else {
        document.getElementById('nextLevelBtn').style.display = 'none';
      }
    }
  }
}

function nextLevel() {
  if (currentLevel < 25) {
    currentLevel++;
    generateMaze();
    draw();
    updateUI();
  }
}

function switchCharacter(charId) {
  currentCharId = charId;
  // Текущий уровень = сколько пройдено + 1, но не больше 25
  currentLevel = characterProgress[charId].levelsCompleted + 1;
  if (currentLevel > 25) currentLevel = 25;
  generateMaze();
  draw();
  updateUI();
}

function initCharacterSelector() {
  const container = document.getElementById('characterSelector');
  container.innerHTML = '';
  for (const [id, data] of Object.entries(CHARACTERS)) {
    const btn = document.createElement('div');
    btn.className = 'char-btn';
    btn.dataset.char = id;
    btn.innerHTML = `${data.icon} ${data.name}<div class="char-progress">${characterProgress[id].levelsCompleted}/25</div>`;
    btn.onclick = () => switchCharacter(id);
    container.appendChild(btn);
  }
}

// ==================== УПРАВЛЕНИЕ ====================
document.addEventListener("keydown", (e) => {
  if (!gameActive) return;
  switch(e.key) {
    case "ArrowUp": e.preventDefault(); move(0, -1); break;
    case "ArrowDown": e.preventDefault(); move(0, 1); break;
    case "ArrowLeft": e.preventDefault(); move(-1, 0); break;
    case "ArrowRight": e.preventDefault(); move(1, 0); break;
  }
});

let touchStartX = 0, touchStartY = 0;
const gameWrapper = document.querySelector('.game-wrapper');
if (gameWrapper) {
  gameWrapper.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
  });
  gameWrapper.addEventListener("touchend", (e) => {
    if (!gameActive) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 15) {
      if (dx > 0) move(1, 0);
      else move(-1, 0);
    } else if (Math.abs(dy) > 15) {
      if (dy > 0) move(0, 1);
      else move(0, -1);
    }
    e.preventDefault();
  });
}

document.getElementById('nextLevelBtn').onclick = () => nextLevel();

// ==================== ЗАПУСК ====================
initCharacterSelector();
generateMaze();
draw();
updateUI();
</script>
</body>
</html>
