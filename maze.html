<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌀 Линия лабиринта</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    select, button {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button { background: #ff7b4f; border-color: #ffaa33; }
    #game { display: inline-grid; gap: 2px; margin: 20px auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; }
    .cell { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 5px; background-color: #1f2f3f; }
    .wall { background-color: #0f1a24; color: #4a6a7a; }
    .player { background-color: #ff9f4b; border-radius: 50%; }
    .goal { background-color: #4caf50; border-radius: 50%; }
    .stats { background: #0a1e2c; border-radius: 40px; padding: 12px; display: flex; justify-content: center; gap: 20px; font-size: 14px; font-weight: bold; color: #ffd966; margin: 15px 0; }
    .level-display { text-align: center; font-size: 20px; margin: 10px 0; color: #ffd966; }
    .next-btn { background: #4caf50; padding: 10px 20px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; margin: 10px auto; display: block; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    .hint { text-align: center; font-size: 12px; margin: 10px 0; color: #a8e6ff; }
    @media (max-width: 480px) { .cell { width: 28px; height: 28px; font-size: 16px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🌀 Линия лабиринта</h1>
  <div class="controls">
    <select id="characterSelect">
      <option value="cheburashka">Чебурашка → 🐵🍊</option>
      <option value="pin">Пин → 🐧🚗</option>
      <option value="matroskin">Матроскин → 🐱🐄</option>
      <option value="masha">Маша → 👧🐻</option>
    </select>
    <button id="startBtn">Начать</button>
  </div>
  <div id="game"></div>
  <div id="stats" class="stats"></div>
  <div id="levelDisplay" class="level-display">Уровень: 1</div>
  <button id="nextLevelBtn" class="next-btn" style="display: none;">➡️ Следующий уровень</button>
  <p class="hint">Управление: стрелки или свайп</p>
  <a href="index.html" class="back">⬅ На главную</a>
</div>
<script>
  (function(){
    const gameDiv = document.getElementById('game');
    const characterSelect = document.getElementById('characterSelect');
    const startBtn = document.getElementById('startBtn');
    const nextLevelBtn = document.getElementById('nextLevelBtn');
    const levelDisplay = document.getElementById('levelDisplay');
    const statsDiv = document.getElementById('stats');
    
    const characters = {
      cheburashka: { player: "🐵", goal: "🍊" },
      pin: { player: "🐧", goal: "🚗" },
      matroskin: { player: "🐱", goal: "🐄" },
      masha: { player: "👧", goal: "🐻" }
    };
    
    let size = 11;
    let maze = [];
    let player = { x: 0, y: 0 };
    let goal = { x: size - 1, y: size - 1 };
    let playerEmoji = "🐵";
    let goalEmoji = "🍊";
    let steps = 0;
    let timer = 0;
    let timerInterval = null;
    let gameActive = true;
    let currentLevel = 1;
    
    function updateStats() {
      statsDiv.innerHTML = `Шаги: ${steps} | Время: ${timer}с | Уровней: ${currentLevel - 1}`;
    }
    
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timer = 0;
      updateStats();
      timerInterval = setInterval(() => { timer++; updateStats(); }, 1000);
    }
    
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }
    
    function generateMaze() {
      maze = Array(size).fill().map(() => Array(size).fill(1));
      function carve(x, y) {
        const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]].sort(() => Math.random() - 0.5);
        maze[y][x] = 0;
        for (const [dx, dy] of dirs) {
          const nx = x + dx;
          const ny = y + dy;
          if (nx >= 0 && ny >= 0 && nx < size && ny < size && maze[ny][nx] === 1) {
            maze[y + dy/2][x + dx/2] = 0;
            carve(nx, ny);
          }
        }
      }
      carve(0, 0);
      goal = { x: size - 1, y: size - 1 };
      maze[goal.y][goal.x] = 0;
    }
    
    function draw() {
      gameDiv.innerHTML = "";
      const cellSize = Math.min(35, window.innerWidth / size);
      gameDiv.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          if (x === player.x && y === player.y) {
            cell.classList.add("player");
            cell.textContent = playerEmoji;
          } else if (x === goal.x && y === goal.y) {
            cell.classList.add("goal");
            cell.textContent = goalEmoji;
          } else if (maze[y][x] === 1) {
            cell.classList.add("wall");
            cell.textContent = "█";
          } else {
            cell.textContent = "·";
          }
          gameDiv.appendChild(cell);
        }
      }
    }
    
    function move(dx, dy) {
      if (!gameActive) return;
      const nx = player.x + dx;
      const ny = player.y + dy;
      if (nx >= 0 && ny >= 0 && nx < size && ny < size && maze[ny][nx] === 0) {
        player.x = nx;
        player.y = ny;
        steps++;
        updateStats();
        draw();
        if (player.x === goal.x && player.y === goal.y) {
          gameActive = false;
          stopTimer();
          nextLevelBtn.style.display = "block";
          setTimeout(() => {
            alert(`🎉 Уровень ${currentLevel} пройден! Шагов: ${steps}, Время: ${timer}с`);
          }, 100);
        }
      }
    }
    
    function startGame() {
      const choice = characterSelect.value;
      playerEmoji = characters[choice].player;
      goalEmoji = characters[choice].goal;
      steps = 0;
      gameActive = true;
      generateMaze();
      player = { x: 0, y: 0 };
      draw();
      stopTimer();
      startTimer();
      updateStats();
      nextLevelBtn.style.display = "none";
      levelDisplay.textContent = `Уровень: ${currentLevel}`;
    }
    
    function nextLevel() {
      currentLevel++;
      startGame();
    }
    
    document.addEventListener("keydown", (e) => {
      if (!gameActive) return;
      switch(e.key) {
        case "ArrowUp": e.preventDefault(); move(0, -1); break;
        case "ArrowDown": e.preventDefault(); move(0, 1); break;
        case "ArrowLeft": e.preventDefault(); move(-1, 0); break;
        case "ArrowRight": e.preventDefault(); move(1, 0); break;
      }
    });
    
    let touchStartX = 0, touchStartY = 0;
    gameDiv.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    });
    gameDiv.addEventListener("touchend", (e) => {
      if (!gameActive) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 20) {
        if (dx > 0) move(1, 0);
        else move(-1, 0);
      } else if (Math.abs(dy) > 20) {
        if (dy > 0) move(0, 1);
        else move(0, -1);
      }
      e.preventDefault();
    });
    
    startBtn.onclick = () => { currentLevel = 1; startGame(); };
    nextLevelBtn.onclick = () => { nextLevel(); };
    
    startGame();
  })();
</script>
</body>
</html>
