<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Линия лабиринта</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 24px; margin-bottom: 15px; color: #ffd966; }
    .character-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .char-btn {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 8px 12px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      min-width: 85px;
    }
    .char-btn.active { background: #ff7b4f; border-color: #ffaa33; }
    .char-progress { font-size: 10px; margin-top: 3px; color: #a8e6ff; }
    .stats {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 13px;
      font-weight: bold;
      color: #ffd966;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .game-wrapper {
      text-align: center;
      margin: 10px 0;
      overflow-x: auto;
    }
    #game { 
      display: inline-grid; 
      gap: 2px; 
      margin: 0 auto;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 20px;
    }
    .cell { 
      width: 32px; 
      height: 32px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 16px; 
      border-radius: 5px; 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .path { background-color: #d4c5a0; color: #5a4a2a; }
    .wall { background-color: #1a2a3a; color: #4a6a8a; }
    .player { background-color: #ffaa44; border-radius: 50%; color: #000; }
    .goal { background-color: #ffdd44; border-radius: 50%; color: #000; }
    .next-btn { background: #4caf50; padding: 10px 20px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; margin: 10px auto; display: block; }
    .upload-btn { 
      background: #4a6a8a; 
      padding: 5px 10px; 
      border-radius: 20px; 
      font-size: 10px; 
      margin-left: 5px;
      cursor: pointer;
      display: inline-block;
    }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    .hint { text-align: center; font-size: 11px; margin: 10px 0; color: #a8e6ff; }
    @media (max-width: 550px) { .cell { width: 28px; height: 28px; font-size: 14px; } }
    @media (max-width: 480px) { .cell { width: 24px; height: 24px; font-size: 12px; } }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🌀 Линия лабиринта</h1>
  
  <div class="character-selector" id="characterSelector"></div>
  
  <div class="stats">
    <span>🎮 <span id="currentCharName">—</span> <span id="currentLevel">1</span>/25</span>
    <span>🏆 Всего: <span id="totalLevels">0</span>/100</span>
    <span>🪙 <span id="coinsDisplay">0</span></span>
  </div>
  
  <div class="game-wrapper">
    <div id="game"></div>
  </div>
  
  <button id="nextLevelBtn" class="next-btn" style="display: none;">➡️ Следующий уровень</button>
  <p class="hint">⬆️⬇️⬅️➡️ или свайп</p>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
const CHARACTERS = {
  cheburashka: { name: 'Чебурашка', player: '🐵', goal: '🍊', icon: '🐵' },
  pin: { name: 'Пин', player: '🐧', goal: '🚗', icon: '🐧' },
  matroskin: { name: 'Матроскин', player: '🐱', goal: '🐄', icon: '🐱' },
  masha: { name: 'Маша', player: '👧', goal: '🐻', icon: '👧' }
};

// Хранилище для загруженных изображений
let customImages = JSON.parse(localStorage.getItem('maze_custom_images')) || {
  cheburashka: null,
  pin: null,
  matroskin: null,
  masha: null
};

function saveImages() {
  localStorage.setItem('maze_custom_images', JSON.stringify(customImages));
}

function uploadImage(charId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        customImages[charId] = event.target.result;
        saveImages();
        // Обновляем отображение персонажа, если он выбран
        if (currentCharId === charId) {
          draw();
        }
        // Обновляем кнопку с превью
        updateCharacterButtons();
        alert(`✅ Изображение для ${CHARACTERS[charId].name} загружено!`);
      };
      reader.readAsDataURL(file);
    }
  };
  input.click();
}

function getPlayerImage(charId) {
  return customImages[charId] || null;
}

function updateCharacterButtons() {
  document.querySelectorAll('.char-btn').forEach(btn => {
    const charId = btn.dataset.char;
    const hasImage = customImages[charId];
    const uploadSpan = btn.querySelector('.upload-indicator');
    if (uploadSpan) {
      uploadSpan.textContent = hasImage ? '📷✅' : '📷';
    }
  });
}

// Остальной код лабиринта (генерация, движение и т.д.)
let currentCharId = 'cheburashka';
let maze = [];
let player = { x: 0, y: 0 };
let goal = { x: 0, y: 0 };
const SIZE = 12;
let steps = 0;
let gameActive = true;
let currentLevel = 1;

let characterProgress = JSON.parse(localStorage.getItem('maze_character_progress')) || {
  cheburashka: { levelsCompleted: 0, totalSteps: 0, got25Reward: false },
  pin: { levelsCompleted: 0, totalSteps: 0, got25Reward: false },
  matroskin: { levelsCompleted: 0, totalSteps: 0, got25Reward: false },
  masha: { levelsCompleted: 0, totalSteps: 0, got25Reward: false }
};

let coins = parseInt(localStorage.getItem('memory_coins') || '0');

function saveProgress() {
  localStorage.setItem('maze_character_progress', JSON.stringify(characterProgress));
  localStorage.setItem('memory_coins', coins);
}

function updateUI() {
  document.getElementById('coinsDisplay').textContent = coins;
  document.getElementById('currentCharName').textContent = CHARACTERS[currentCharId].name;
  document.getElementById('currentLevel').textContent = currentLevel;
  
  let totalLevels = 0;
  for (let char in characterProgress) {
    let completed = characterProgress[char].levelsCompleted;
    if (completed > 25) completed = 25;
    totalLevels += completed;
  }
  document.getElementById('totalLevels').textContent = totalLevels;
  
  document.querySelectorAll('.char-btn').forEach(btn => {
    const charId = btn.dataset.char;
    let progress = characterProgress[charId].levelsCompleted;
    if (progress > 25) progress = 25;
    btn.classList.toggle('active', charId === currentCharId);
    btn.querySelector('.char-progress').textContent = `${progress}/25`;
  });
}

function giveCoin(amount = 1) {
  coins += amount;
  saveProgress();
  updateUI();
}

function getReachableCells() {
  const reachable = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
  const queue = [{ x: player.x, y: player.y }];
  reachable[player.y][player.x] = true;
  
  while (queue.length > 0) {
    const { x, y } = queue.shift();
    const neighbors = [[0, -1], [0, 1], [-1, 0], [1, 0]];
    for (const [dx, dy] of neighbors) {
      const nx = x + dx;
      const ny = y + dy;
      if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE && 
          maze[ny][nx] === 0 && !reachable[ny][nx]) {
        reachable[ny][nx] = true;
        queue.push({ x: nx, y: ny });
      }
    }
  }
  return reachable;
}

function generateMaze() {
  maze = Array(SIZE).fill().map(() => Array(SIZE).fill(1));
  
  function carve(x, y) {
    const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
    for (let i = dirs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
    }
    maze[y][x] = 0;
    for (const [dx, dy] of dirs) {
      const nx = x + dx;
      const ny = y + dy;
      if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE && maze[ny][nx] === 1) {
        maze[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  
  carve(0, 0);
  
  player = { x: 0, y: 0 };
  maze[player.y][player.x] = 0;
  
  const reachable = getReachableCells();
  
  const possibleGoals = [];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (reachable[y][x] && (x !== player.x || y !== player.y)) {
        possibleGoals.push({ x, y });
      }
    }
  }
  
  if (possibleGoals.length > 0) {
    const randomIndex = Math.floor(Math.random() * possibleGoals.length);
    goal = possibleGoals[randomIndex];
  } else {
    goal = { x: SIZE - 1, y: SIZE - 1 };
  }
  
  maze[goal.y][goal.x] = 0;
  steps = 0;
  gameActive = true;
  document.getElementById('nextLevelBtn').style.display = 'none';
}

function draw() {
  const gameDiv = document.getElementById('game');
  gameDiv.innerHTML = "";
  gameDiv.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
  
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      
      if (x === player.x && y === player.y) {
        cell.classList.add("player");
        const img = getPlayerImage(currentCharId);
        if (img) {
          cell.style.backgroundImage = `url('${img}')`;
          cell.style.backgroundSize = 'cover';
          cell.textContent = '';
        } else {
          cell.textContent = CHARACTERS[currentCharId].player;
        }
      } else if (x === goal.x && y === goal.y) {
        cell.classList.add("goal");
        cell.textContent = CHARACTERS[currentCharId].goal;
      } else if (maze[y][x] === 1) {
        cell.classList.add("wall");
        cell.textContent = "█";
      } else {
        cell.classList.add("path");
        cell.textContent = "·";
      }
      gameDiv.appendChild(cell);
    }
  }
}

function move(dx, dy) {
  if (!gameActive) return;
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE && maze[ny][nx] === 0) {
    player.x = nx;
    player.y = ny;
    steps++;
    draw();
    
    if (player.x === goal.x && player.y === goal.y) {
      gameActive = false;
      
      let currentCompleted = characterProgress[currentCharId].levelsCompleted;
      
      if (currentCompleted >= 25) {
        giveCoin(1);
        alert(`🎉 Уровень ${currentLevel} пройден!\n+1 монета`);
      } else {
        const newCompleted = currentCompleted + 1;
        characterProgress[currentCharId].levelsCompleted = newCompleted;
        characterProgress[currentCharId].totalSteps += steps;
        
        if (newCompleted === 25 && !characterProgress[currentCharId].got25Reward) {
          characterProgress[currentCharId].got25Reward = true;
          giveCoin(10);
          alert(`🎉 ПОЗДРАВЛЯЮ! ${CHARACTERS[currentCharId].name} достиг 25 уровня!\n+10 монет`);
        }
        else if (newCompleted % 2 === 0) {
          giveCoin(1);
          alert(`🎉 Уровень ${currentLevel} пройден!\n+1 монета`);
        } else {
          alert(`🎉 Уровень ${currentLevel} пройден!`);
        }
      }
      
      saveProgress();
      updateUI();
      
      if (currentLevel < 25) {
        currentLevel++;
        generateMaze();
        draw();
        updateUI();
      } else {
        document.getElementById('nextLevelBtn').style.display = 'none';
      }
    }
  }
}

function nextLevel() {
  if (currentLevel < 25) {
    currentLevel++;
    generateMaze();
    draw();
    updateUI();
  }
}

function switchCharacter(charId) {
  currentCharId = charId;
  let completed = characterProgress[charId].levelsCompleted;
  if (completed > 25) completed = 25;
  currentLevel = completed + 1;
  if (currentLevel > 25) currentLevel = 25;
  generateMaze();
  draw();
  updateUI();
}

function initCharacterSelector() {
  const container = document.getElementById('characterSelector');
  container.innerHTML = '';
  for (const [id, data] of Object.entries(CHARACTERS)) {
    let progress = characterProgress[id].levelsCompleted;
    if (progress > 25) progress = 25;
    const btn = document.createElement('div');
    btn.className = 'char-btn';
    btn.dataset.char = id;
    btn.innerHTML = `${data.icon} ${data.name}<div class="char-progress">${progress}/25</div><span class="upload-indicator" style="font-size:10px;margin-left:5px;cursor:pointer;">📷</span>`;
    btn.onclick = (e) => {
      if (e.target.classList.contains('upload-indicator')) {
        e.stopPropagation();
        uploadImage(id);
      } else {
        switchCharacter(id);
      }
    };
    container.appendChild(btn);
  }
  updateCharacterButtons();
}

document.addEventListener("keydown", (e) => {
  if (!gameActive) return;
  switch(e.key) {
    case "ArrowUp": e.preventDefault(); move(0, -1); break;
    case "ArrowDown": e.preventDefault(); move(0, 1); break;
    case "ArrowLeft": e.preventDefault(); move(-1, 0); break;
    case "ArrowRight": e.preventDefault(); move(1, 0); break;
  }
});

let touchStartX = 0, touchStartY = 0;
const gameWrapper = document.querySelector('.game-wrapper');
if (gameWrapper) {
  gameWrapper.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
  });
  gameWrapper.addEventListener("touchend", (e) => {
    if (!gameActive) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 15) {
      if (dx > 0) move(1, 0);
      else move(-1, 0);
    } else if (Math.abs(dy) > 15) {
      if (dy > 0) move(0, 1);
      else move(0, -1);
    }
    e.preventDefault();
  });
}

document.getElementById('nextLevelBtn').onclick = () => nextLevel();

initCharacterSelector();
generateMaze();
draw();
updateUI();
</script>
</body>
</html>
