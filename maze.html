<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌀 Линия лабиринта</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: rgba(10, 25, 40, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { text-align: center; font-size: 28px; margin-bottom: 20px; color: #ffd966; }
    .character-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .char-btn {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 8px 12px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      min-width: 80px;
    }
    .char-btn.active { background: #ff7b4f; border-color: #ffaa33; }
    .char-progress { font-size: 10px; margin-top: 3px; color: #a8e6ff; }
    .stats {
      background: #0a1e2c;
      border-radius: 40px;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 14px;
      font-weight: bold;
      color: #ffd966;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .game-wrapper {
      overflow-x: auto;
      text-align: center;
      margin: 10px 0;
    }
    #game { 
      display: inline-grid; 
      gap: 2px; 
      margin: 0 auto;
      background: rgba(0,0,0,0.3); 
      padding: 8px; 
      border-radius: 16px;
    }
    .cell { 
      width: 30px; 
      height: 30px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 16px; 
      border-radius: 4px; 
    }
    .path { background-color: #d4c5a0; color: #5a4a2a; }
    .wall { background-color: #1a2a3a; color: #4a6a8a; }
    .player { background-color: #ffaa44; border-radius: 50%; color: #000; }
    .goal { background-color: #ffdd44; border-radius: 50%; color: #000; }
    .next-btn { background: #4caf50; padding: 10px 20px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; margin: 10px auto; display: block; }
    .back { display: block; text-align: center; margin-top: 20px; color: #b0e0ff; text-decoration: none; font-weight: bold; background: #1e3a5f; padding: 10px; border-radius: 40px; border: 2px solid #4f9fff; }
    .hint { text-align: center; font-size: 12px; margin: 10px 0; color: #a8e6ff; }
    @media (max-width: 550px) { 
      .cell { width: 26px; height: 26px; font-size: 14px; }
    }
    @media (max-width: 480px) { 
      .cell { width: 24px; height: 24px; font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🌀 Линия лабиринта</h1>
  
  <div class="character-selector" id="characterSelector"></div>
  
  <div class="stats">
    <span>🎮 <span id="currentCharName">—</span> <span id="currentLevel">1</span>/25</span>
    <span>🏆 <span id="totalLevels">0</span>/100</span>
    <span>🪙 <span id="coinsDisplay">0</span></span>
  </div>
  
  <div class="game-wrapper">
    <div id="game"></div>
  </div>
  
  <button id="nextLevelBtn" class="next-btn" style="display: none;">➡️ Следующий уровень</button>
  <p class="hint">Управление: стрелки или свайп</p>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<script>
const gameDiv = document.getElementById('game');
const nextLevelBtn = document.getElementById('nextLevelBtn');
const levelDisplay = document.getElementById('currentLevel');
const totalLevelsSpan = document.getElementById('totalLevels');
const coinsSpan = document.getElementById('coinsDisplay');
const currentCharNameSpan = document.getElementById('currentCharName');

const characters = {
  cheburashka: { name: 'Чебурашка', player: "🐵", goal: "🍊", icon: "🐵" },
  pin: { name: 'Пин', player: "🐧", goal: "🚗", icon: "🐧" },
  matroskin: { name: 'Матроскин', player: "🐱", goal: "🐄", icon: "🐱" },
  masha: { name: 'Маша', player: "👧", goal: "🐻", icon: "👧" }
};

// Профессии (каждые 3 уровня)
const MAZE_PROFESSIONS = {
  3: '🧹 Уборщик тоннелей', 6: '🔧 Слесарь депо', 9: '🚇 Дежурный по станции',
  12: '📢 Диспетчер', 15: '🚆 Машинист 3-го класса', 18: '🚆 Машинист 2-го класса',
  21: '🚆 Машинист 1-го класса', 24: '🏭 Начальник депо', 27: '📊 Начальник службы движения',
  30: '👔 Начальник линии', 33: '📈 Начальник управления', 36: '🏛️ Зам. начальника метро',
  39: '👑 Начальник метрополитена', 42: '⭐ Заслуженный работник', 45: '🏅 Почётный ветеран',
  48: '📜 Хранитель традиций', 51: '🚇 Легенда подземки', 54: '🔮 Проводник времени',
  57: '⚡ Повелитель тоннелей', 60: '🌟 Звезда метро', 63: '💎 Алмазный машинист',
  66: '🏆 Мастер подземелий', 69: '🎖️ Герой метро', 72: '👑 Король эскалаторов',
  75: '📖 Летописец линий', 78: '⚙️ Хранитель механизмов', 81: '🚀 Первопроходец',
  84: '🌌 Повелитель поездов', 87: '💫 Абсолют метро', 90: '🏛️ Легендарный начальник',
  93: '👑 Император подземки', 96: '⭐ Великий машинист', 99: '🏆 Легенда №1'
};

let size = 12;  // Размер поля 12×12
let maze = [];
let player = { x: 0, y: 0 };
let goal = { x: size - 1, y: size - 1 };
let playerEmoji = "🐵";
let goalEmoji = "🍊";
let steps = 0;
let gameActive = true;
let currentLevel = 1;
let currentCharId = 'cheburashka';

// Прогресс по персонажам
let characterProgress = JSON.parse(localStorage.getItem('maze_character_progress')) || {
  cheburashka: { levelsCompleted: 0, totalSteps: 0 },
  pin: { levelsCompleted: 0, totalSteps: 0 },
  matroskin: { levelsCompleted: 0, totalSteps: 0 },
  masha: { levelsCompleted: 0, totalSteps: 0 }
};

let artifacts = JSON.parse(localStorage.getItem('metro_artifacts')) || { mazeRewards: {} };
let coins = parseInt(localStorage.getItem('memory_coins') || '0');

function saveProgress() {
  localStorage.setItem('maze_character_progress', JSON.stringify(characterProgress));
  localStorage.setItem('metro_artifacts', JSON.stringify(artifacts));
  localStorage.setItem('memory_coins', coins);
}

function updateUI() {
  coinsSpan.textContent = coins;
  currentCharNameSpan.textContent = characters[currentCharId].name;
  levelDisplay.textContent = currentLevel;
  
  let totalLevels = 0;
  for (let char in characterProgress) {
    totalLevels += characterProgress[char].levelsCompleted;
  }
  totalLevelsSpan.textContent = totalLevels;
  
  document.querySelectorAll('.char-btn').forEach(btn => {
    const charId = btn.dataset.char;
    const progress = characterProgress[charId].levelsCompleted;
    btn.classList.toggle('active', charId === currentCharId);
    btn.querySelector('.char-progress').textContent = `${progress}/25`;
  });
}

function giveCoin() {
  coins++;
  saveProgress();
  updateUI();
  setTimeout(() => alert(`🪙 +1 монета (всего: ${coins})`), 300);
}

function giveReward(levelNum) {
  const rewardName = MAZE_PROFESSIONS[levelNum];
  if (!rewardName) return;
  if (!artifacts.mazeRewards[levelNum]) {
    artifacts.mazeRewards[levelNum] = true;
    saveProgress();
    setTimeout(() => alert(`🏆 ПОЛУЧЕНО: ${rewardName}`), 300);
  }
}

function generateMaze() {
  maze = Array(size).fill().map(() => Array(size).fill(1));
  function carve(x, y) {
    const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]].sort(() => Math.random() - 0.5);
    maze[y][x] = 0;
    for (const [dx, dy] of dirs) {
      const nx = x + dx;
      const ny = y + dy;
      if (nx >= 0 && ny >= 0 && nx < size && ny < size && maze[ny][nx] === 1) {
        maze[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  carve(0, 0);
  goal = { x: size - 1, y: size - 1 };
  maze[goal.y][goal.x] = 0;
  player = { x: 0, y: 0 };
  steps = 0;
  gameActive = true;
  nextLevelBtn.style.display = "none";
}

function draw() {
  gameDiv.innerHTML = "";
  const cellSize = Math.min(32, Math.floor(window.innerWidth / size) - 2);
  gameDiv.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      if (x === player.x && y === player.y) {
        cell.classList.add("player");
        cell.textContent = playerEmoji;
      } else if (x === goal.x && y === goal.y) {
        cell.classList.add("goal");
        cell.textContent = goalEmoji;
      } else if (maze[y][x] === 1) {
        cell.classList.add("wall");
        cell.textContent = "█";
      } else {
        cell.classList.add("path");
        cell.textContent = "·";
      }
      gameDiv.appendChild(cell);
    }
  }
}

function move(dx, dy) {
  if (!gameActive) return;
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx >= 0 && ny >= 0 && nx < size && ny < size && maze[ny][nx] === 0) {
    player.x = nx;
    player.y = ny;
    steps++;
    draw();
    if (player.x === goal.x && player.y === goal.y) {
      gameActive = false;
      
      giveCoin();
      
      const totalCompleted = characterProgress[currentCharId].levelsCompleted + 1;
      if (totalCompleted % 3 === 0) giveReward(totalCompleted);
      
      characterProgress[currentCharId].levelsCompleted = totalCompleted;
      characterProgress[currentCharId].totalSteps += steps;
      saveProgress();
      updateUI();
      
      if (currentLevel >= 25) {
        setTimeout(() => {
          alert(`🎉 ВСЕ 25 УРОВНЕЙ ПРОЙДЕНЫ за ${characters[currentCharId].name}!\n+10 монет!`);
          for (let i = 0; i < 10; i++) giveCoin();
        }, 100);
        return;
      }
      
      nextLevelBtn.style.display = "block";
      setTimeout(() => alert(`🎉 Уровень ${currentLevel} пройден!\n+1 монета`), 100);
    }
  }
}

function nextLevel() {
  if (currentLevel < 25) {
    currentLevel++;
    generateMaze();
    draw();
    updateUI();
  }
}

function switchCharacter(charId) {
  currentCharId = charId;
  playerEmoji = characters[charId].player;
  goalEmoji = characters[charId].goal;
  currentLevel = characterProgress[charId].levelsCompleted + 1;
  if (currentLevel > 25) currentLevel = 25;
  generateMaze();
  draw();
  updateUI();
}

function initCharacterSelector() {
  const container = document.getElementById('characterSelector');
  container.innerHTML = '';
  for (const [id, data] of Object.entries(characters)) {
    const btn = document.createElement('div');
    btn.className = 'char-btn';
    btn.dataset.char = id;
    btn.innerHTML = `${data.icon} ${data.name}<div class="char-progress">${characterProgress[id].levelsCompleted}/25</div>`;
    btn.onclick = () => switchCharacter(id);
    container.appendChild(btn);
  }
}

document.addEventListener("keydown", (e) => {
  if (!gameActive) return;
  switch(e.key) {
    case "ArrowUp": e.preventDefault(); move(0, -1); break;
    case "ArrowDown": e.preventDefault(); move(0, 1); break;
    case "ArrowLeft": e.preventDefault(); move(-1, 0); break;
    case "ArrowRight": e.preventDefault(); move(1, 0); break;
  }
});

let touchStartX = 0, touchStartY = 0;
gameDiv.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
});
gameDiv.addEventListener("touchend", (e) => {
  if (!gameActive) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 20) {
    if (dx > 0) move(1, 0);
    else move(-1, 0);
  } else if (Math.abs(dy) > 20) {
    if (dy > 0) move(0, 1);
    else move(0, -1);
  }
  e.preventDefault();
});

nextLevelBtn.onclick = () => nextLevel();

initCharacterSelector();
generateMaze();
draw();
updateUI();
</script>
</body>
</html>
