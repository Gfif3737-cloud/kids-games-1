<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏛️ Музей метро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #f5f0e0, #e8e0d0);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255, 248, 225, 0.95);
      border-radius: 48px;
      padding: 25px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.1);
      border: 1px solid #d4b87a;
    }
    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
      color: #b8860b;
      font-family: 'Times New Roman', serif;
    }
    .stats {
      background: #fff8e7;
      border: 3px solid #d4a017;
      border-radius: 50px;
      padding: 12px 25px;
      width: fit-content;
      margin: 0 auto 25px;
      text-align: center;
    }
    .stats span { color: #b8860b; font-weight: bold; font-size: 28px; }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: #f0e0c0;
      border: 2px solid #d4a017;
      padding: 10px 25px;
      border-radius: 40px;
      color: #8b5a2b;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active { background: #d4a017; color: white; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      background: #fffaf0;
      border: 3px solid #d4a017;
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 5px 0 #b8860b;
    }
    .card.obtained { background: #e8f5e8; border-color: #4caf50; }
    .card.locked { opacity: 0.7; filter: grayscale(0.3); background: #f5e8d0; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #b8860b; }
    .icon { font-size: 48px; margin-bottom: 8px; }
    .name { font-size: 13px; font-weight: bold; color: #8b5a2b; margin-bottom: 5px; }
    .status { font-size: 11px; color: #b8860b; margin-top: 6px; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fffaf0;
      border: 4px solid #d4a017;
      border-radius: 40px;
      padding: 25px;
      max-width: 320px;
      width: 85%;
      text-align: center;
    }
    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #b8860b;
    }
    .modal-icon { font-size: 60px; margin: 10px 0; }
    .modal-title { font-size: 20px; margin: 10px 0; color: #b8860b; font-weight: bold; }
    .modal-howto { background: #fff0e0; padding: 12px; border-radius: 20px; margin: 15px 0; font-size: 14px; text-align: left; }
    .modal-status { margin-top: 15px; padding: 8px; border-radius: 30px; background: #d4a017; color: white; font-weight: bold; }
    .back {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      background: #d4a017;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 5px 0 #8b5a2b;
    }
    .back:active { transform: translateY(3px); box-shadow: 0 2px 0 #8b5a2b; }
    @media (max-width: 550px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } .icon { font-size: 36px; } }
  </style>
</head>
<body>
<div class="container">
  <h1>🏛️ МУЗЕЙ МЕТРО</h1>
  <div class="stats">
    Собрано наград: <span id="totalCount">0</span> / <span id="maxCount">0</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="memory">🎁 Память (25)</button>
    <button class="tab-btn" data-tab="maze">🏆 Лабиринт (10)</button>
    <button class="tab-btn" data-tab="match3">🚃 Три в ряд (4)</button>
  </div>
  <div id="grid" class="grid"></div>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" id="closeModal">&times;</span>
    <div class="modal-icon" id="modalIcon">🏆</div>
    <div class="modal-title" id="modalTitle">Название</div>
    <div class="modal-howto" id="modalHowto">Как получить: ...</div>
    <div id="modalStatus" class="modal-status">🔒 Не получено</div>
  </div>
</div>

<script>
// ==================== ДАННЫЕ НАГРАД ====================

// 1. НАГРАДЫ ПАМЯТИ (25 штук) - читаем из memory_progress
const MEMORY_THEMES = [
  { name: 'Смешарики', icon: '🐰', rewards: ['Крош', 'Ёжик', 'Нюша', 'Бараш', 'Лосяш'] },
  { name: 'Простоквашино', icon: '🐱', rewards: ['Матроскин', 'Шарик', 'Дядя Фёдор', 'Печкин', 'Галчонок'] },
  { name: 'Фиксики', icon: '🔧', rewards: ['Нолик', 'Симка', 'Папус', 'Мася', 'Дедус'] },
  { name: 'Винни Пух', icon: '🐻', rewards: ['Винни', 'Пятачок', 'Кролик', 'Иа', 'Сова'] },
  { name: 'Маша и Медведь', icon: '👧', rewards: ['Маша', 'Медведь', 'Панда', 'Розочка', 'Зайка'] }
];
const LEVEL_NAMES = ['Лёгкий (4×2)', 'Средний (4×3)', 'Сложный (4×4)', 'Эксперт (4×5)', 'Мастер (4×6)'];

// 2. НАГРАДЫ ЛАБИРИНТА (10 штук) - читаем из maze_completed
const MAZE_REWARDS = [
  { level: 3, name: '🏆 Первый километр', howto: 'Пройди 3 уровня в лабиринте' },
  { level: 6, name: '🏆 Подземный ходок', howto: 'Пройди 6 уровней в лабиринте' },
  { level: 9, name: '🏆 Станция «Туннель»', howto: 'Пройди 9 уровней в лабиринте' },
  { level: 12, name: '🏆 Машинист 3-го класса', howto: 'Пройди 12 уровней в лабиринте' },
  { level: 15, name: '🏆 Машинист 2-го класса', howto: 'Пройди 15 уровней в лабиринте' },
  { level: 18, name: '🏆 Машинист 1-го класса', howto: 'Пройди 18 уровней в лабиринте' },
  { level: 21, name: '🏆 Начальник депо', howto: 'Пройди 21 уровень в лабиринте' },
  { level: 24, name: '🏆 Начальник линии', howto: 'Пройди 24 уровня в лабиринте' },
  { level: 27, name: '🏆 Начальник метро', howto: 'Пройди 27 уровней в лабиринте' },
  { level: 30, name: '🏆 Легенда метро', howto: 'Пройди 30 уровней в лабиринте' }
];

// 3. НАГРАДЫ ТРИ В РЯД (4 штуки) - читаем из match3_progress
const MATCH3_REWARDS = [
  { level: 'level1', name: 'Вагон типа А (1935)', icon: '🚃', howto: 'Пройди УРОВЕНЬ 1 в игре «Три в ряд»' },
  { level: 'level2', name: 'Вагон типа Б (1937)', icon: '🚋', howto: 'Пройди УРОВЕНЬ 2 в игре «Три в ряд»' },
  { level: 'level3', name: 'Вагон типа Г (1940)', icon: '🚞', howto: 'Пройди УРОВЕНЬ 3 в игре «Три в ряд»' },
  { level: 'level4', name: 'Вагон типа Д (1955)', icon: '🚆', howto: 'Пройди УРОВЕНЬ 4 в игре «Три в ряд»' }
];

// ==================== ЗАГРУЗКА ПРОГРЕССА ИЗ ИГР ====================

// Получаем прогресс памяти (какие уровни пройдены)
function getMemoryProgress() {
  const progress = JSON.parse(localStorage.getItem('memory_progress')) || {};
  const obtained = [];
  
  for (let theme of MEMORY_THEMES) {
    const themeProgress = progress[theme.name] || {};
    for (let i = 0; i < theme.rewards.length; i++) {
      const levelId = `level${i + 1}`;
      const isCompleted = themeProgress[levelId + '_completed'] === true;
      obtained.push(isCompleted);
    }
  }
  return obtained;
}

// Получаем прогресс лабиринта (сколько уровней пройдено)
function getMazeProgress() {
  const completedLevels = JSON.parse(localStorage.getItem('maze_completed')) || 0;
  const obtained = [];
  for (let reward of MAZE_REWARDS) {
    obtained.push(completedLevels >= reward.level);
  }
  return obtained;
}

// Получаем прогресс три в ряд (какие уровни пройдены)
function getMatch3Progress() {
  const progress = JSON.parse(localStorage.getItem('match3_progress')) || {};
  const obtained = [];
  for (let reward of MATCH3_REWARDS) {
    obtained.push(progress[reward.level]?.completed === true);
  }
  return obtained;
}

// ==================== ВСЕ НАГРАДЫ С СИНХРОНИЗАЦИЕЙ ====================
let MEMORY_REWARDS = [];
let MAZE_REWARDS_LIST = [];
let MATCH3_REWARDS_LIST = [];

function buildRewards() {
  // Награды памяти
  MEMORY_REWARDS = [];
  for (let t of MEMORY_THEMES) {
    for (let i = 0; i < t.rewards.length; i++) {
      MEMORY_REWARDS.push({
        name: `${t.rewards[i]} (${t.name})`,
        icon: t.icon,
        howto: `Пройди уровень «${LEVEL_NAMES[i]}» в игре «Линия памяти» для мультфильма «${t.name}»`,
        theme: t.name,
        level: i
      });
    }
  }
  
  // Награды лабиринта
  MAZE_REWARDS_LIST = [...MAZE_REWARDS];
  
  // Награды три в ряд
  MATCH3_REWARDS_LIST = [...MATCH3_REWARDS];
}

// Обновление статуса наград
function updateRewardsStatus() {
  const memoryObtained = getMemoryProgress();
  const mazeObtained = getMazeProgress();
  const match3Obtained = getMatch3Progress();
  
  MEMORY_REWARDS.forEach((item, idx) => {
    item.obtained = memoryObtained[idx] || false;
  });
  
  MAZE_REWARDS_LIST.forEach((item, idx) => {
    item.obtained = mazeObtained[idx] || false;
  });
  
  MATCH3_REWARDS_LIST.forEach((item, idx) => {
    item.obtained = match3Obtained[idx] || false;
  });
}

// ==================== ОТРИСОВКА ====================
let currentTab = 'memory';
const gridDiv = document.getElementById('grid');
const totalSpan = document.getElementById('totalCount');
const maxSpan = document.getElementById('maxCount');

function getCurrentItems() {
  if (currentTab === 'memory') return MEMORY_REWARDS;
  if (currentTab === 'maze') return MAZE_REWARDS_LIST;
  return MATCH3_REWARDS_LIST;
}

function countTotal() {
  let total = 0;
  total += MEMORY_REWARDS.filter(i => i.obtained).length;
  total += MAZE_REWARDS_LIST.filter(i => i.obtained).length;
  total += MATCH3_REWARDS_LIST.filter(i => i.obtained).length;
  return total;
}

function countMax() {
  return MEMORY_REWARDS.length + MAZE_REWARDS_LIST.length + MATCH3_REWARDS_LIST.length;
}

function render() {
  const items = getCurrentItems();
  gridDiv.innerHTML = '';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = `card ${item.obtained ? 'obtained' : 'locked'}`;
    card.innerHTML = `
      <div class="icon">${item.icon}</div>
      <div class="name">${item.name}</div>
      <div class="status">${item.obtained ? '✓ Получено' : '🔒 Не получено'}</div>
    `;
    card.onclick = () => showModal(item);
    gridDiv.appendChild(card);
  });
  totalSpan.textContent = countTotal();
  maxSpan.textContent = countMax();
}

function showModal(item) {
  document.getElementById('modalIcon').textContent = item.icon;
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalHowto').innerHTML = `📜 <strong>Как получить:</strong><br>${item.howto}`;
  const statusDiv = document.getElementById('modalStatus');
  statusDiv.textContent = item.obtained ? '✅ ПОЛУЧЕНО' : '🔒 ЕЩЁ НЕ ПОЛУЧЕНО';
  statusDiv.style.background = item.obtained ? '#4a2c00' : '#a87c3a';
  document.getElementById('modal').style.display = 'flex';
}

// ==================== ВКЛАДКИ ====================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

document.getElementById('closeModal').onclick = () => {
  document.getElementById('modal').style.display = 'none';
};
window.onclick = (e) => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').style.display = 'none';
  }
};

// ==================== ЗАПУСК ====================
buildRewards();
updateRewardsStatus();
render();

// Автообновление каждые 2 секунды (чтобы видеть изменения после игры)
setInterval(() => {
  updateRewardsStatus();
  render();
}, 2000);
</script>
</body>
</html>
