<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏛️ Музей метро</title>
  <link rel="stylesheet" href="museum.css" />
</head>
<body>

  <h1>🏛️ МУЗЕЙ МЕТРО</h1>
  
  <div class="museum-stats">
    <div class="stat-item">
      <span class="stat-label">Собрано артефактов:</span>
      <span id="total-collected" class="stat-value">0</span>
      <span class="stat-label">/79</span>
    </div>
  </div>

  <div class="museum-categories"></div>

  <div id="artifacts-container" class="artifacts-grid"></div>

  <div id="artifact-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <div class="modal-icon" id="modal-icon">🏆</div>
      <h2 id="modal-title">Название</h2>
      <p id="modal-howto" class="howto-text"></p>
      <p id="modal-desc" class="desc-text"></p>
      <p id="modal-status" class="artifact-status">Получено</p>
    </div>
  </div>

  <div class="back-button">
    <a href="index.html" class="back-btn">⬅ На главную</a>
  </div>

  <script src="museum.js"></script>
</body>
</html>
