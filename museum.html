<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏛️ Музей метро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0a1c2f, #0b2b3f);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 32px;
      margin: 20px 0;
      color: #ffd966;
      text-shadow: 0 2px 0 #b45f1a;
    }
    .stats {
      background: rgba(0,0,0,0.5);
      border-radius: 50px;
      padding: 12px 25px;
      width: fit-content;
      margin: 0 auto 20px;
      text-align: center;
      font-size: 20px;
      border: 2px solid #ffaa33;
    }
    .stats span { color: #ffd966; font-weight: bold; font-size: 28px; }
    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }
    .cat-btn {
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .cat-btn.active {
      background: #ff7b4f;
      border-color: #ffaa33;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      background: #1b3a4b;
      border: 2px solid #ffaa33;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .card.locked {
      opacity: 0.6;
      filter: grayscale(0.3);
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #ffd966;
    }
    .icon { font-size: 48px; margin-bottom: 8px; }
    .name { font-size: 14px; font-weight: bold; color: #ffd966; margin-bottom: 5px; }
    .status { font-size: 12px; color: #a8e6ff; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1b3a4b;
      border: 3px solid #ffaa33;
      border-radius: 40px;
      padding: 25px;
      max-width: 300px;
      width: 80%;
      text-align: center;
    }
    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #ffd966;
    }
    .modal-icon { font-size: 60px; margin: 10px 0; }
    .modal-title { font-size: 20px; margin: 10px 0; color: #ffd966; }
    .modal-howto { background: #0a1e2c; padding: 12px; border-radius: 20px; margin: 15px 0; font-size: 14px; text-align: left; }
    .modal-desc { font-size: 13px; margin: 10px 0; }
    .back {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      background: #1e3a5f;
      border: 2px solid #4f9fff;
      padding: 10px 25px;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
    }
    @media (max-width: 500px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .icon { font-size: 36px; }
    }
  </style>
</head>
<body>

<h1>🏛️ МУЗЕЙ МЕТРО</h1>

<div class="stats">
  Собрано артефактов: <span id="totalCount">0</span> / <span id="maxCount">0</span>
</div>

<div class="categories" id="categories"></div>

<div id="grid" class="grid"></div>

<a href="index.html" class="back">⬅ На главную</a>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" id="closeModal">&times;</span>
    <div class="modal-icon" id="modalIcon">🏆</div>
    <div class="modal-title" id="modalTitle">Название</div>
    <div class="modal-howto" id="modalHowto">Как получить: ...</div>
    <div class="modal-desc" id="modalDesc">Описание</div>
    <div id="modalStatus" style="margin-top: 15px; padding: 8px; border-radius: 30px; background: #4a2c00;">🔒 Не получено</div>
  </div>
</div>

<script>
  (function() {
    // ==================== ДАННЫЕ НАГРАД ====================
    const REWARDS = {
      // Вагоны (три в ряд)
      wagons: [
        { name: 'Вагон типа А (1935)', icon: '🚃', howto: 'Пройди УРОВЕНЬ 1 в игре «Три в ряд»', desc: 'Первый серийный вагон.' },
        { name: 'Вагон типа Б (1937)', icon: '🚋', howto: 'Пройди УРОВЕНЬ 2 в игре «Три в ряд»', desc: 'Модернизированная версия.' },
        { name: 'Вагон типа Г (1940)', icon: '🚞', howto: 'Пройди УРОВЕНЬ 3 в игре «Три в ряд»', desc: 'Цельнометаллический.' },
        { name: 'Вагон типа Д (1955)', icon: '🚆', howto: 'Пройди УРОВЕНЬ 4 в игре «Три в ряд»', desc: 'Тот самый «синий вагон».' }
      ],
      // Награды памяти (фигурки)
      memory: [],
      // Награды лабиринта
      maze: []
    };
    
    // Заполняем награды памяти (5 мультиков × 5 уровней = 25)
    const memoryThemes = [
      { name: 'Смешарики', icon: '🐰', rewards: ['Крош', 'Ёжик', 'Нюша', 'Бараш', 'Лосяш'] },
      { name: 'Простоквашино', icon: '🐱', rewards: ['Матроскин', 'Шарик', 'Дядя Фёдор', 'Печкин', 'Галчонок'] },
      { name: 'Фиксики', icon: '🔧', rewards: ['Нолик', 'Симка', 'Папус', 'Мася', 'Дедус'] },
      { name: 'Винни Пух', icon: '🐻', rewards: ['Винни', 'Пятачок', 'Кролик', 'Иа', 'Сова'] },
      { name: 'Маша и Медведь', icon: '👧', rewards: ['Маша', 'Медведь', 'Панда', 'Розочка', 'Зайка'] }
    ];
    
    for (let t of memoryThemes) {
      for (let i = 0; i < t.rewards.length; i++) {
        const levelNames = ['Лёгкий (4×2)', 'Средний (4×3)', 'Сложный (4×4)', 'Эксперт (4×5)', 'Мастер (4×6)'];
        REWARDS.memory.push({
          name: `${t.rewards[i]} (${t.name})`,
          icon: t.icon,
          howto: `🎮 Пройди уровень «${levelNames[i]}» в игре «Линия памяти» для мультфильма «${t.name}»`,
          desc: `Фигурка ${t.rewards[i]} из мультфильма "${t.name}".`,
          theme: t.name,
          level: i
        });
      }
    }
    
    // Награды лабиринта (10 штук)
    const mazeRewardsList = [
      { level: 3, name: '🏆 Первый километр', howto: 'Пройди 3 уровня в лабиринте' },
      { level: 6, name: '🏆 Подземный ходок', howto: 'Пройди 6 уровней в лабиринте' },
      { level: 9, name: '🏆 Станция «Туннель»', howto: 'Пройди 9 уровней в лабиринте' },
      { level: 12, name: '🏆 Машинист 3-го класса', howto: 'Пройди 12 уровней в лабиринте' },
      { level: 15, name: '🏆 Машинист 2-го класса', howto: 'Пройди 15 уровней в лабиринте' },
      { level: 18, name: '🏆 Машинист 1-го класса', howto: 'Пройди 18 уровней в лабиринте' },
      { level: 21, name: '🏆 Начальник депо', howto: 'Пройди 21 уровень в лабиринте' },
      { level: 24, name: '🏆 Начальник линии', howto: 'Пройди 24 уровня в лабиринте' },
      { level: 27, name: '🏆 Начальник метро', howto: 'Пройди 27 уровней в лабиринте' },
      { level: 30, name: '🏆 Легенда метро', howto: 'Пройди 30 уровней в лабиринте' }
    ];
    
    for (let r of mazeRewardsList) {
      REWARDS.maze.push({
        name: r.name,
        icon: '🏆',
        howto: r.howto,
        desc: 'Награда за прохождение уровней в лабиринте',
        level: r.level
      });
    }
    
    // ==================== ЗАГРУЗКА ПРОГРЕССА ====================
    function loadProgress() {
      const artifacts = JSON.parse(localStorage.getItem('metro_artifacts')) || {};
      
      // Статус для вагонов
      const wagonsProgress = artifacts.wagons || [false, false, false, false];
      REWARDS.wagons.forEach((item, idx) => {
        item.obtained = wagonsProgress[idx] || false;
      });
      
      // Статус для наград памяти
      const memoryRewards = artifacts.memoryRewards || {};
      REWARDS.memory.forEach(item => {
        const themeProgress = memoryRewards[item.theme] || [];
        item.obtained = themeProgress[item.level] === true;
      });
      
      // Статус для наград лабиринта
      const mazeRewards = artifacts.mazeRewards || {};
      REWARDS.maze.forEach(item => {
        item.obtained = mazeRewards[item.level] === true;
      });
    }
    
    // ==================== ПОДСЧЁТ ====================
    function countTotal() {
      let total = 0;
      for (let cat in REWARDS) {
        total += REWARDS[cat].filter(r => r.obtained).length;
      }
      return total;
    }
    
    function countMax() {
      let max = 0;
      for (let cat in REWARDS) {
        max += REWARDS[cat].length;
      }
      return max;
    }
    
    // ==================== ОТРИСОВКА ====================
    let currentCategory = 'wagons';
    
    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      const items = REWARDS[currentCategory];
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = `card ${item.obtained ? '' : 'locked'}`;
        card.innerHTML = `
          <div class="icon">${item.icon}</div>
          <div class="name">${item.name}</div>
          <div class="status">${item.obtained ? '✓ Получено' : '🔒 Не получено'}</div>
        `;
        card.onclick = () => showModal(item);
        grid.appendChild(card);
      });
      
      document.getElementById('totalCount').textContent = countTotal();
      document.getElementById('maxCount').textContent = countMax();
    }
    
    function showModal(item) {
      document.getElementById('modalIcon').textContent = item.icon;
      document.getElementById('modalTitle').textContent = item.name;
      document.getElementById('modalHowto').innerHTML = `📜 <strong>Как получить:</strong><br>${item.howto}`;
      document.getElementById('modalDesc').innerHTML = `📖 <strong>Описание:</strong><br>${item.desc}`;
      const statusDiv = document.getElementById('modalStatus');
      statusDiv.textContent = item.obtained ? '✅ ПОЛУЧЕНО' : '🔒 ЕЩЁ НЕ ПОЛУЧЕНО';
      statusDiv.style.background = item.obtained ? '#4a2c00' : '#5a3a2a';
      document.getElementById('modal').style.display = 'flex';
    }
    
    // ==================== КАТЕГОРИИ ====================
    const categories = [
      { id: 'wagons', name: '🚃 Вагоны (4)' },
      { id: 'memory', name: '🎁 Награды памяти (25)' },
      { id: 'maze', name: '🏆 Награды лабиринта (10)' }
    ];
    
    function initCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${currentCategory === cat.id ? 'active' : ''}`;
        btn.textContent = cat.name;
        btn.onclick = () => {
          currentCategory = cat.id;
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        };
        container.appendChild(btn);
      });
    }
    
    // ==================== МОДАЛЬНОЕ ОКНО ====================
    document.getElementById('closeModal').onclick = () => {
      document.getElementById('modal').style.display = 'none';
    };
    window.onclick = (e) => {
      if (e.target === document.getElementById('modal')) {
        document.getElementById('modal').style.display = 'none';
      }
    };
    
    // ==================== ЗАПУСК ====================
    loadProgress();
    initCategories();
    render();
  })();
</script>
</body>
</html>
