<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏛️ Музей метро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #f5f0e0, #e8e0d0);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 248, 225, 0.95);
      border-radius: 48px;
      padding: 25px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.1);
      border: 1px solid #d4b87a;
    }
    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
      color: #b8860b;
      font-family: 'Times New Roman', serif;
    }
    .stats {
      background: #fff8e7;
      border: 3px solid #d4a017;
      border-radius: 50px;
      padding: 12px 25px;
      width: fit-content;
      margin: 0 auto 25px;
      text-align: center;
      display: flex;
      gap: 30px;
    }
    .stats span { color: #b8860b; font-weight: bold; font-size: 28px; }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: #f0e0c0;
      border: 2px solid #d4a017;
      padding: 10px 25px;
      border-radius: 40px;
      color: #8b5a2b;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active { background: #d4a017; color: white; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #fffaf0;
      border: 3px solid #d4a017;
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 5px 0 #b8860b;
    }
    .card.obtained { background: #e8f5e8; border-color: #4caf50; }
    .card.locked { opacity: 0.7; filter: grayscale(0.3); background: #f5e8d0; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #b8860b; }
    .icon { font-size: 48px; margin-bottom: 8px; }
    .name { font-size: 14px; font-weight: bold; color: #8b5a2b; margin-bottom: 5px; }
    .status { font-size: 11px; color: #b8860b; margin-top: 6px; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fffaf0;
      border: 4px solid #d4a017;
      border-radius: 40px;
      padding: 25px;
      max-width: 320px;
      width: 85%;
      text-align: center;
    }
    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #b8860b;
    }
    .modal-icon { font-size: 60px; margin: 10px 0; }
    .modal-title { font-size: 20px; margin: 10px 0; color: #b8860b; font-weight: bold; }
    .modal-howto { background: #fff0e0; padding: 12px; border-radius: 20px; margin: 15px 0; font-size: 14px; text-align: left; }
    .modal-status { margin-top: 15px; padding: 8px; border-radius: 30px; background: #d4a017; color: white; font-weight: bold; }
    .back {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      background: #d4a017;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 5px 0 #8b5a2b;
    }
    .back:active { transform: translateY(3px); box-shadow: 0 2px 0 #8b5a2b; }
    @media (max-width: 550px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } .icon { font-size: 36px; } }
  </style>
</head>
<body>
<div class="container">
  <h1>🏛️ МУЗЕЙ МЕТРО</h1>
  <div class="stats">
    <div>🎭 Фигурок: <span id="figuresCount">0</span> / <span id="maxFigures">0</span></div>
    <div>🪙 Монеток: <span id="coinsCount">0</span></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="grid" class="grid"></div>
  <a href="index.html" class="back">⬅ На главную</a>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" id="closeModal">&times;</span>
    <div class="modal-icon" id="modalIcon">🏆</div>
    <div class="modal-title" id="modalTitle">Название</div>
    <div class="modal-howto" id="modalHowto">Как получить: ...</div>
    <div id="modalStatus" class="modal-status">🔒 Не получено</div>
  </div>
</div>

<script>
// ==================== ВСЕ МУЛЬТФИЛЬМЫ И ПЕРСОНАЖИ ====================
const ALL_THEMES = [
  {
    name: 'Смешарики',
    icon: '🐰',
    characters: [
      { name: 'Крош', icon: '🐰', desc: 'Весёлый и энергичный кролик. Любит приключения и морковку!' },
      { name: 'Ёжик', icon: '🦔', desc: 'Застенчивый и добрый ёжик. Коллекционирует кактусы и грибы.' },
      { name: 'Нюша', icon: '🐷', desc: 'Красавица-хрюшка. Мечтает стать принцессой и любит моду.' },
      { name: 'Бараш', icon: '🐑', desc: 'Поэтичный и чувствительный баран. Пишет стихи и грустит.' },
      { name: 'Лосяш', icon: '🦌', desc: 'Умный лось-учёный. Знает всё на свете и любит читать.' }
    ]
  },
  {
    name: 'Простоквашино',
    icon: '🐱',
    characters: [
      { name: 'Матроскин', icon: '🐱', desc: 'Хозяйственный кот в полосатой тельняшке. Любит корову Мурку.' },
      { name: 'Шарик', icon: '🐶', desc: 'Пёс-охотник. Мечтает о фотоаппарате и дружит с Матроскиным.' },
      { name: 'Дядя Фёдор', icon: '👦', desc: 'Добрый мальчик, который нашёл друзей в Простоквашино.' },
      { name: 'Печкин', icon: '📮', desc: 'Почтальон с велосипедом. Любит чай и всегда приносит новости.' },
      { name: 'Галчонок', icon: '🐦', desc: 'Маленькая галка, которая научилась говорить: «Кто там?».' }
    ]
  },
  {
    name: 'Фиксики',
    icon: '🔧',
    characters: [
      { name: 'Нолик', icon: '0️⃣', desc: 'Маленький фиксик в оранжевом комбинезоне. Любит приключения.' },
      { name: 'Симка', icon: '1️⃣', desc: 'Фиксик в красном комбинезоне. Умная и ответственная сестра Нолика.' },
      { name: 'Папус', icon: '👨', desc: 'Папа фиксиков. Знает всё о технике и любит свою семью.' },
      { name: 'Мася', icon: '👩', desc: 'Мама фиксиков. Заботливая и вкусно готовит.' },
      { name: 'Дедус', icon: '👴', desc: 'Мудрый дедушка фиксиков. Знает самые древние секреты.' }
    ]
  },
  {
    name: 'Винни Пух',
    icon: '🐻',
    characters: [
      { name: 'Винни', icon: '🐻', desc: 'Медвежонок, который любит мёд и сочинять песенки.' },
      { name: 'Пятачок', icon: '🐖', desc: 'Маленький поросёнок. Лучший друг Винни.' },
      { name: 'Кролик', icon: '🐇', desc: 'Практичный кролик. Любит порядок и свой огород.' },
      { name: 'Иа', icon: '🐴', desc: 'Осёл с грустным голосом. Иногда теряет свой хвост.' },
      { name: 'Сова', icon: '🦉', desc: 'Мудрая сова. Любит рассказывать истории и писать письма.' }
    ]
  },
  {
    name: 'Маша и Медведь',
    icon: '👧',
    characters: [
      { name: 'Маша', icon: '👧', desc: 'Непоседливая девочка, которая придумывает новые игры.' },
      { name: 'Медведь', icon: '🐻', desc: 'Добрый медведь, который раньше работал в цирке.' },
      { name: 'Панда', icon: '🐼', desc: 'Племянник Медведя. Любит спорт и соревнования.' },
      { name: 'Розочка', icon: '🌸', desc: 'Маленькая свинка, подруга Маши. Любит наряжаться.' },
      { name: 'Зайка', icon: '🐰', desc: 'Быстрый зайка. Любит морковку и всегда прибегает первым.' }
    ]
  }
];

// ==================== ЗАГРУЗКА ПРОГРЕССА ====================
function loadProgress() {
  const levelProgress = JSON.parse(localStorage.getItem('memory_level_progress')) || {
    collectedCharacters: {}
  };
  
  // Инициализация
  for (let theme of ALL_THEMES) {
    if (!levelProgress.collectedCharacters[theme.name]) {
      levelProgress.collectedCharacters[theme.name] = [false, false, false, false, false];
    }
  }
  
  const coins = JSON.parse(localStorage.getItem('memory_coins')) || 0;
  
  return { levelProgress, coins };
}

// ==================== ПОСТРОЕНИЕ ВКЛАДОК ====================
let currentTheme = null;
let allCharacters = [];

function buildCharacters() {
  allCharacters = [];
  for (let theme of ALL_THEMES) {
    for (let i = 0; i < theme.characters.length; i++) {
      allCharacters.push({
        themeName: theme.name,
        themeIcon: theme.icon,
        charIndex: i,
        char: theme.characters[i]
      });
    }
  }
}

function renderTabs() {
  const tabsContainer = document.getElementById('tabs');
  tabsContainer.innerHTML = '';
  
  // Кнопка "Все"
  const allBtn = document.createElement('button');
  allBtn.className = `tab-btn ${currentTheme === null ? 'active' : ''}`;
  allBtn.textContent = '🎭 Все (25)';
  allBtn.onclick = () => {
    currentTheme = null;
    renderTabs();
    renderGrid();
  };
  tabsContainer.appendChild(allBtn);
  
  // Кнопки по темам
  for (let theme of ALL_THEMES) {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${currentTheme === theme.name ? 'active' : ''}`;
    btn.textContent = `${theme.icon} ${theme.name} (5)`;
    btn.onclick = () => {
      currentTheme = theme.name;
      renderTabs();
      renderGrid();
    };
    tabsContainer.appendChild(btn);
  }
}

function renderGrid() {
  const { levelProgress, coins } = loadProgress();
  const collectedCharacters = levelProgress.collectedCharacters;
  const gridDiv = document.getElementById('grid');
  const figuresCountSpan = document.getElementById('figuresCount');
  const coinsCountSpan = document.getElementById('coinsCount');
  const maxFiguresSpan = document.getElementById('maxFigures');
  
  // Подсчёт общего количества фигурок
  let totalFigures = 0;
  let obtainedFigures = 0;
  for (let theme of ALL_THEMES) {
    for (let i = 0; i < theme.characters.length; i++) {
      totalFigures++;
      if (collectedCharacters[theme.name]?.[i]) obtainedFigures++;
    }
  }
  maxFiguresSpan.textContent = totalFigures;
  figuresCountSpan.textContent = obtainedFigures;
  coinsCountSpan.textContent = coins;
  
  // Фильтрация персонажей
  let displayCharacters = allCharacters;
  if (currentTheme !== null) {
    displayCharacters = allCharacters.filter(c => c.themeName === currentTheme);
  }
  
  gridDiv.innerHTML = '';
  for (let char of displayCharacters) {
    const isObtained = collectedCharacters[char.themeName]?.[char.charIndex] || false;
    const themeData = ALL_THEMES.find(t => t.name === char.themeName);
    const charData = themeData.characters[char.charIndex];
    
    const card = document.createElement('div');
    card.className = `card ${isObtained ? 'obtained' : 'locked'}`;
    card.innerHTML = `
      <div class="icon">${charData.icon}</div>
      <div class="name">${charData.name}</div>
      <div class="status">${isObtained ? '✓ Получено' : '🔒 Не получено'}</div>
    `;
    card.onclick = () => showModal(charData, themeData.name, isObtained);
    gridDiv.appendChild(card);
  }
}

function showModal(charData, themeName, isObtained) {
  document.getElementById('modalIcon').textContent = charData.icon;
  document.getElementById('modalTitle').textContent = `${charData.name} (${themeName})`;
  document.getElementById('modalHowto').innerHTML = `📜 <strong>Как получить:</strong><br>Играй в «Линию памяти» — этот персонаж может выпасть на любом уровне!`;
  const statusDiv = document.getElementById('modalStatus');
  statusDiv.textContent = isObtained ? '✅ ПОЛУЧЕНО' : '🔒 ЕЩЁ НЕ ПОЛУЧЕНО';
  statusDiv.style.background = isObtained ? '#4a2c00' : '#a87c3a';
  document.getElementById('modal').style.display = 'flex';
}

// ==================== ЗАКРЫТИЕ МОДАЛКИ ====================
document.getElementById('closeModal').onclick = () => {
  document.getElementById('modal').style.display = 'none';
};
window.onclick = (e) => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').style.display = 'none';
  }
};

// ==================== ЗАПУСК ====================
buildCharacters();
currentTheme = null;
renderTabs();
renderGrid();

// Автообновление каждые 2 секунды
setInterval(() => {
  renderGrid();
}, 2000);
</script>
</body>
</html>
